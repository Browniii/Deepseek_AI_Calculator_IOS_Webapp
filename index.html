<!DOCTYPE html>
<html lang="en">
<head>
    <!-- iOS SAFARI STANDALONE OPTIMIZATION -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Updated to 'black' for a solid pure black top bar -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    <meta name="theme-color" content="#000000">
    <title>Calculator</title>

    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            /* iOS Calculator Colors */
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --sci-dark-grey: #1A1A1A;
            --action-grey: #525252;
            --number-grey: #2B2B2B;
            --operator-orange: #FF9300;

            /* Reference dimensions for iPhone 13 (1170x2532) */
            --ref-w: 1170;
            --ref-h: 2532;

            /* Aspect-ratio based spacing/sizes using cqw/cqh */
            --gap-btn: calc((24 / var(--ref-w)) * 100cqw); 
            /* REMOVED 141px padding requirement: Set to 0 */
            --pad-top: 0;
            --pad-side: calc((50 / var(--ref-w)) * 100cqw);
            --header-btn-size: calc((120 / var(--ref-w)) * 100cqw);
            --pad-bottom: calc((186 / var(--ref-h)) * 100cqh);
            --btn-height: calc((144 / var(--ref-h)) * 100cqh);
            --btn-lower-w: calc((250 / var(--ref-w)) * 100cqw);
            --btn-upper-w: calc((160 / var(--ref-w)) * 100cqw);
            
            /* Text sizes scaled by width ratio */
            --font-screen: calc((154 / var(--ref-w)) * 100cqw);
            --font-num: calc((52 / var(--ref-w)) * 100cqw); 
            --font-action: calc((62 / var(--ref-w)) * 100cqw);
            --font-upper: calc((37 / var(--ref-w)) * 100cqw); 
            --font-pm: calc((81 / var(--ref-w)) * 100cqw);

            /* Dynamic Opacity Vars */
            --kbd-opacity: 0.10;
            --text-opacity: 0.20;
            --log-opacity: 0.10;
            --cam-opacity: 0.10;
            --pic-opacity: 0.15;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: #1A1A1A; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            color: var(--text-color);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }

        /* Container ensures calculator maintains phone proportions */
        #calculator-app {
            container-type: size;
            width: 100%; height: 100%;
            max-width: 450px; max-height: 974px; 
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            box-sizing: border-box;
            padding-bottom: var(--pad-bottom); 
            position: relative;
            overflow: hidden;
        }

        /* --- VISUAL OVERLAYS (Camera & Photo) --- */
        #camera-view, #photo-preview {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 50; pointer-events: none;
        }
        #camera-view.active { display: block; opacity: var(--cam-opacity); }
        #photo-preview.active { display: block; opacity: var(--pic-opacity); }

        /* Camera/Picture state indicator */
        #camera-indicator {
            position: absolute; top: 40px; left: 50%;
            transform: translateX(-50%); font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; opacity: 0; color: var(--operator-orange);
            z-index: 100; transition: opacity 0.3s;
        }
        #camera-indicator.visible { opacity: 0.8; }

        /* --- OVERLAY INTERFACES --- */
        .overlay-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000;
            display: none; flex-direction: column; padding: 10% 10%;
            box-sizing: border-box; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .settings-header { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .setting-item { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .setting-item label { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1.5px; }
        .setting-item input[type="range"], .setting-item input[type="text"], .setting-item input[type="password"], .setting-item select, .setting-item textarea {
            width: 100%; background: #1c1c1c; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; font-size: 14px; outline: none;
        }
        .setting-item textarea { height: 60px; resize: none; font-family: inherit; }
        .setting-item.row { flex-direction: row; justify-content: space-between; align-items: center; }
        .close-btn { margin-top: 20px; background: var(--operator-orange); border: none; color: white; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; flex-shrink: 0; }

        /* History Log View */
        #log-pad {
            position: absolute; top: 0; left: 0; width: 100%; 
            height: calc((var(--btn-height) * 5) + (var(--gap-btn) * 4)); 
            display: none; flex-direction: column; z-index: 6;
            padding: 0 var(--pad-side); box-sizing: border-box;
            overflow-y: auto; opacity: var(--log-opacity); scrollbar-width: none;
        }
        #log-pad.active { display: flex; }
        .log-entry { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .log-prompt { color: var(--operator-orange); font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .log-response { color: white; font-size: 13px; line-height: 1.4; white-space: pre-wrap; }

        /* Header / Nav UI */
        .header { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; padding-left: var(--pad-side); padding-right: var(--pad-side); width: 100%; box-sizing: border-box; z-index: 10; }
        .header-btn { width: var(--header-btn-size); height: var(--header-btn-size); background-color: var(--sci-dark-grey); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; cursor: pointer; color: #FFFFFF; }
        .header-btn svg { width: 50%; height: 50%; stroke: currentColor; fill: none; stroke-width: 1.5; }

        /* Output Displays */
        .display-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 0 var(--pad-side) 2cqh var(--pad-side); overflow: hidden; z-index: 10; }
        
        .typed-text-display { 
            width: 100%; 
            color: rgba(255, 255, 255, var(--text-opacity)); 
            font-size: calc(var(--font-screen) * 0.22); 
            line-height: 1.3; 
            text-align: right; 
            max-height: 4.5em; 
            overflow-y: auto; 
            overflow-x: hidden; 
            word-wrap: break-word; 
            white-space: pre-wrap; 
            margin-bottom: 8px; 
            outline: none; 
            user-select: text; 
            -webkit-user-select: text; 
            caret-color: transparent; 
        }
        .typed-text-display:focus { caret-color: #FFFFFF; } 
        .screen { font-size: var(--font-screen); font-weight: 300; line-height: 1; margin: 0; letter-spacing: -2px; color: #FFFFFF; }

        /* Inputs / Keypads */
        .keypad { display: flex; flex-direction: column; gap: var(--gap-btn); margin-top: auto; position: relative; z-index: 10; }
        .calc-btn { border: none; outline: none; cursor: pointer; color: #FFFFFF; border-radius: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: filter 0.1s; height: var(--btn-height); position: relative; }
        .calc-btn:active { filter: brightness(1.5); }
        .calc-btn svg { width: 45%; height: 45%; stroke: currentColor; fill: none; stroke-width: 1.5; }
        .helper-text { position: absolute; bottom: 10%; font-size: 9px; text-transform: lowercase; opacity: 0.25; display: none; }

        .scientific-grid { display: grid; grid-template-columns: repeat(6, var(--btn-upper-w)); justify-content: center; gap: var(--gap-btn); transition: opacity 0.3s; }
        .sci-btn { background-color: var(--sci-dark-grey); width: var(--btn-upper-w); font-size: var(--font-upper); white-space: nowrap; }
        .basic-grid { display: grid; grid-template-columns: repeat(4, var(--btn-lower-w)); justify-content: center; gap: var(--gap-btn); }
        .btn-action { background-color: var(--action-grey); font-size: var(--font-action); }
        .btn-number { background-color: var(--number-grey); font-size: var(--font-num); }
        .btn-operator { background-color: var(--operator-orange); font-size: var(--font-action); }

        /* --- MODE-SPECIFIC OVERRIDES --- */
        .camera-essential { z-index: 60 !important; }
        .keyboard-hidden { opacity: 0 !important; pointer-events: none !important; }

        .keyboard-grid { position: absolute; top: 0; left: 0; width: 100%; display: none; flex-direction: column; gap: var(--gap-btn); opacity: var(--kbd-opacity); padding-left: var(--pad-side); padding-right: var(--pad-side); box-sizing: border-box; height: calc((var(--btn-height) * 5) + (var(--gap-btn) * 4)); justify-content: center; z-index: 5; pointer-events: none; }
        .keyboard-grid.active { display: flex; pointer-events: auto; }
        .kbd-row { display: flex; justify-content: center; gap: calc(var(--gap-btn) * 0.35); height: calc(var(--btn-height) * 0.85); }
        .kbd-btn { background-color: var(--sci-dark-grey); border-radius: calc(var(--btn-height) * 0.2); flex: 1; font-size: calc(var(--font-upper) * 1.25); text-transform: lowercase; font-weight: 400; color: #FFF; pointer-events: auto; }
        .kbd-btn.shift-active { background-color: #FFFFFF; color: #000000; }
        
        #api-status { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 10px; opacity: 0.8; letter-spacing: 1.2px; display: none; color: var(--operator-orange); font-weight: bold; width: 80%; text-align: center; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="calculator-app">
        <!-- Live Video & Result Previews -->
        <video id="camera-view" autoplay playsinline></video>
        <img id="photo-preview" src="">
        
        <div id="camera-indicator">camera mode</div>
        <div id="api-status">THINKING...</div>

        <!-- SETTINGS PANEL -->
        <div id="settings-panel" class="overlay-panel">
            <div class="settings-header">Preferences</div>
            <div class="setting-item">
                <label>DeepSeek API Key</label>
                <input type="password" id="input-api-key" placeholder="Paste your key here">
            </div>
            <div class="setting-item">
                <label>Model Mode</label>
                <select id="input-model-mode">
                    <option value="deepseek-reasoner">Reasoning (Reasoner)</option>
                    <option value="deepseek-chat">Thinking (Chat)</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label>Thinking Instructions (Chat)</label>
                <textarea id="prompt-thinking" placeholder="Instructions for standard chat..."></textarea>
            </div>
            <div class="setting-item">
                <label>Reasoning Instructions (Reasoner)</label>
                <textarea id="prompt-reasoning" placeholder="Instructions for deep reasoning..."></textarea>
            </div>
            <div class="setting-item">
                <label>Camera/Vision Instructions</label>
                <textarea id="prompt-camera" placeholder="Instructions for image solving..."></textarea>
            </div>

            <div class="setting-item">
                <label>Text Above Opacity: <span id="label-text-opacity">20</span>%</label>
                <input type="range" id="input-text-opacity" min="0" max="100" value="20">
            </div>
            <div class="setting-item">
                <label>Keyboard Opacity: <span id="label-kbd-opacity">10</span>%</label>
                <input type="range" id="input-kbd-opacity" min="0" max="100" value="10">
            </div>
            <div class="setting-item">
                <label>Camera Opacity: <span id="label-cam-opacity">10</span>%</label>
                <input type="range" id="input-cam-opacity" min="0" max="100" value="10">
            </div>
            <div class="setting-item">
                <label>Picture Opacity: <span id="label-pic-opacity">15</span>%</label>
                <input type="range" id="input-pic-opacity" min="0" max="100" value="15">
            </div>
            <div class="setting-item">
                <label>History Log Opacity: <span id="label-log-opacity">10</span>%</label>
                <input type="range" id="input-log-opacity" min="0" max="100" value="10">
            </div>
            <div class="setting-item row">
                <label>Overlay Active</label>
                <input type="checkbox" id="input-overlay-toggle">
            </div>
            <button class="close-btn" id="close-settings-btn">Done</button>
        </div>

        <!-- HEADER UI -->
        <div class="header">
            <button class="header-btn" id="toggle-log-btn" aria-label="History Log">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 15 14"></polyline></svg>
            </button>
            <button class="header-btn" id="toggle-keyboard-btn" aria-label="Math Notes">
                <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2" ry="2"></rect><line x1="8" y1="8" x2="16" y2="8"></line><circle cx="8" cy="13" r="1" fill="currentColor"></circle><circle cx="12" cy="13" r="1" fill="currentColor"></circle><circle cx="16" cy="13" r="1" fill="currentColor"></circle><circle cx="8" cy="17" r="1" fill="currentColor"></circle><circle cx="12" cy="17" r="1" fill="currentColor"></circle><circle cx="16" cy="17" r="1" fill="currentColor"></circle></svg>
            </button>
        </div>

        <!-- DYNAMIC DISPLAYS -->
        <div class="display-container">
            <div class="typed-text-display" id="typed-display" contenteditable="true" spellcheck="false"></div>
            <div class="screen" id="display">0</div>
        </div>

        <!-- BUTTON LAYERS -->
        <div class="keypad">
            <div class="scientific-grid" id="scientific-pad">
                <button class="calc-btn sci-btn">(</button><button class="calc-btn sci-btn">)</button><button class="calc-btn sci-btn">mc</button><button class="calc-btn sci-btn">m+</button><button class="calc-btn sci-btn">m-</button><button class="calc-btn sci-btn">mr</button>
                <button class="calc-btn sci-btn">2<sup>nd</sup></button><button class="calc-btn sci-btn">x²</button><button class="calc-btn sci-btn">x³</button><button class="calc-btn sci-btn">xʸ</button><button class="calc-btn sci-btn">eˣ</button><button class="calc-btn sci-btn">10ˣ</button>
                <button class="calc-btn sci-btn">¹/ₓ</button><button class="calc-btn sci-btn">²√x</button><button class="calc-btn sci-btn">³√x</button><button class="calc-btn sci-btn">ʸ√x</button><button class="calc-btn sci-btn">ln</button><button class="calc-btn sci-btn">log₁₀</button>
                <button class="calc-btn sci-btn">x!</button><button class="calc-btn sci-btn">sin</button><button class="calc-btn sci-btn">cos</button><button class="calc-btn sci-btn">tan</button><button class="calc-btn sci-btn">e</button><button class="calc-btn sci-btn">EE</button>
                <button class="calc-btn sci-btn">Rand</button><button class="calc-btn sci-btn">sinh</button><button class="calc-btn sci-btn">cosh</button><button class="calc-btn sci-btn">tanh</button><button class="calc-btn sci-btn">π</button><button class="calc-btn sci-btn">Rad</button>
            </div>
            <div id="log-pad"></div>
            <div class="keyboard-grid" id="keyboard-grid">
                <div id="kbd-layout-content" style="display:contents"></div>
            </div>
            <!-- Standard numeric pad -->
            <div class="basic-grid">
                <button class="calc-btn basic-btn btn-action" aria-label="Backspace"><svg viewBox="0 0 24 24"><path d="M 8 6 H 19 C 20.1 6 21 6.9 21 8 V 16 C 21 17.1 20.1 18 19 18 H 8 L 3 12 Z" stroke-linejoin="round"></path><line x1="11" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="11" y2="15"></line></svg></button>
                <button class="calc-btn basic-btn btn-action" id="btn-ac">AC<span class="helper-text">space</span></button>
                <button class="calc-btn basic-btn btn-action">%<span class="helper-text">clear</span></button>
                <button class="calc-btn basic-btn btn-operator" id="btn-settings-trigger">÷<span class="helper-text">settings</span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-7">7</button><button class="calc-btn basic-btn btn-number" id="btn-8">8</button><button class="calc-btn basic-btn btn-number" id="btn-9">9</button><button class="calc-btn basic-btn btn-operator">×</button>
                <button class="calc-btn basic-btn btn-number" id="btn-4">4</button><button class="calc-btn basic-btn btn-number" id="btn-5">5</button><button class="calc-btn basic-btn btn-number" id="btn-6">6</button>
                <button class="calc-btn basic-btn btn-operator" id="btn-minus">-<span class="helper-text" id="helper-minus"></span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-1">1</button><button class="calc-btn basic-btn btn-number" id="btn-2">2</button><button class="calc-btn basic-btn btn-number" id="btn-3">3</button>
                <button class="calc-btn basic-btn btn-operator" id="btn-plus">+<span class="helper-text" id="helper-plus">send</span></button>
                <button class="calc-btn basic-btn btn-number btn-plus-minus" aria-label="Plus Minus"><svg viewBox="0 0 40 40"><path d="M 10 14 L 18 14 M 14 10 L 14 18" stroke-width="2.5" stroke-linecap="round"/><line x1="13" y1="28" x2="27" y2="12" stroke-width="2.5" stroke-linecap="round"/><line x1="22" y1="26" x2="30" y2="26" stroke-width="2.5" stroke-linecap="round"/></svg></button>
                <button class="calc-btn basic-btn btn-number" id="btn-0">0<span class="helper-text" id="helper-0"></span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-dot">.<span class="helper-text" id="helper-dot"></span></button>
                <button class="calc-btn basic-btn btn-operator" id="btn-equals">=<span class="helper-text">return</span></button>
            </div>
        </div>
    </div>

    <!-- MAIN APPLICATION SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* --- ELEMENT DEFINITIONS --- */
            const video = document.getElementById('camera-view');
            const photoPreview = document.getElementById('photo-preview');
            const indicator = document.getElementById('camera-indicator');
            const display = document.getElementById('display');
            const typedDisplay = document.getElementById('typed-display');
            const toggleKeyboardBtn = document.getElementById('toggle-keyboard-btn');
            const toggleLogBtn = document.getElementById('toggle-log-btn');
            const sciPad = document.getElementById('scientific-pad');
            const kbdGrid = document.getElementById('keyboard-grid');
            const logPad = document.getElementById('log-pad');
            const kbdContent = document.getElementById('kbd-layout-content');
            const helpers = document.querySelectorAll('.helper-text');
            const settingsPanel = document.getElementById('settings-panel');
            const apiStatus = document.getElementById('api-status');
            const root = document.documentElement;

            /* --- GLOBAL APP STATE --- */
            let history = JSON.parse(localStorage.getItem('aiHistory')) || [];
            let currentInput = '0', previousInput = '', operator = null, waitingForNewValue = false;
            let isKeyboardMode = false, isLogMode = false, isShift = false, keyboardState = 'alpha';
            let isCameraOn = false, isPhotoTaken = false, stream = null;

            /* --- USER PREFERENCES --- */
            const prefs = {
                textOpacity: localStorage.getItem('textOpacity') || 20,
                kbdOpacity: localStorage.getItem('kbdOpacity') || 10,
                logOpacity: localStorage.getItem('logOpacity') || 10,
                camOpacity: localStorage.getItem('camOpacity') || 10,
                picOpacity: localStorage.getItem('picOpacity') || 15,
                overlay: localStorage.getItem('overlay') === null ? true : localStorage.getItem('overlay') === 'true',
                apiKey: localStorage.getItem('deepseekKey') || "",
                model: localStorage.getItem('deepseekModel') || "deepseek-reasoner",
                thinkingPrompt: localStorage.getItem('promptThinking') || "Analyze the query and provide the most correct and concise answer. If it contains math, solve using Python logic. Think in thought about the answer deeply. Provide a short but most correct and concise answer, then explain why later.",
                reasoningPrompt: localStorage.getItem('promptReasoning') || "Think deeply and provide the most correct and concise answer. If math, use Python logic. Explain the logic clearly after providing the result.",
                cameraPrompt: localStorage.getItem('promptCamera') || "Analyze this image and provide a concise and most correct answer for each question in the image. If it contains math, solve using Python logic. If it is hard to read important text, such as being cut off or too blurry, ask the user to retake the image. Think in thought about the answer deeply. To answer, first provide question number if the question has the question number, then ABCD if multiple choice, for short but most correct and concise answer for written answer, repeat for all questions- then explain why later."
            };

            /* --- CAMERA ENGINE --- */
            const startCamera = async () => {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    video.srcObject = stream;
                    video.classList.add('active');
                    indicator.classList.add('visible');
                    indicator.textContent = "camera mode";
                    isCameraOn = true;
                    isPhotoTaken = false;
                    photoPreview.classList.remove('active');
                    
                    kbdGrid.classList.add('keyboard-hidden');
                    bringEssentialsToFront(true);
                    
                    updateCameraHelpers();
                    typedDisplay.contentEditable = "false";
                } catch (err) {
                    apiStatus.textContent = "CAMERA ERROR";
                    apiStatus.style.display = "block";
                    setTimeout(() => apiStatus.style.display = "none", 2000);
                }
            };

            const capturePhoto = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                photoPreview.src = canvas.toDataURL('image/jpeg');
                photoPreview.classList.add('active');
                video.classList.remove('active');
                indicator.textContent = "picture mode";
                isPhotoTaken = true;
                updateCameraHelpers();
            };

            const retakePhoto = () => {
                photoPreview.classList.remove('active');
                video.classList.add('active');
                indicator.textContent = "camera mode";
                isPhotoTaken = false;
                updateCameraHelpers();
            };

            const stopCamera = () => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                }
                video.classList.remove('active');
                photoPreview.classList.remove('active');
                indicator.classList.remove('visible');
                kbdGrid.classList.remove('keyboard-hidden');
                bringEssentialsToFront(false);
                
                isCameraOn = false;
                isPhotoTaken = false;
                updateCameraHelpers();
                typedDisplay.contentEditable = "true";
            };

            const bringEssentialsToFront = (active) => {
                const essentials = [
                    document.getElementById('btn-0'),
                    document.getElementById('btn-plus'),
                    document.getElementById('btn-minus'),
                    document.getElementById('btn-dot')
                ];
                essentials.forEach(btn => {
                    if (active) btn.classList.add('camera-essential');
                    else btn.classList.remove('camera-essential');
                });
                helpers.forEach(h => {
                    const parentId = h.parentElement.id;
                    if (active && !['btn-0', 'btn-plus', 'btn-minus', 'btn-dot'].includes(parentId)) {
                        h.style.visibility = 'hidden';
                    } else {
                        h.style.visibility = 'visible';
                    }
                });
            };

            const updateCameraHelpers = () => {
                const h0 = document.getElementById('helper-0');
                const hDot = document.getElementById('helper-dot');
                const hPlus = document.getElementById('helper-plus');
                const hMinus = document.getElementById('helper-minus');
                if (isKeyboardMode) {
                    h0.style.display = 'block'; hDot.style.display = 'block'; hPlus.style.display = 'block';
                    h0.textContent = !isCameraOn ? 'camera' : (isPhotoTaken ? '' : 'capture');
                    hDot.textContent = isCameraOn ? 'cancel' : '';
                    hPlus.textContent = isPhotoTaken ? 'solve' : 'send';
                    hMinus.textContent = isPhotoTaken ? 'retake' : '';
                    hMinus.style.display = isPhotoTaken ? 'block' : 'none';
                }
            };

            /* --- AI PIPELINE --- */
            const callDeepSeek = async (imageB64 = null) => {
                if (!prefs.apiKey) {
                    apiStatus.textContent = "input deepseek key in settings";
                    apiStatus.style.display = "block";
                    setTimeout(() => apiStatus.style.display = "none", 4000);
                    return;
                }

                apiStatus.textContent = "THINKING...";
                apiStatus.style.display = "block";

                try {
                    let response;
                    let systemPrompt;
                    if (imageB64) {
                        systemPrompt = prefs.cameraPrompt;
                    } else if (prefs.model === 'deepseek-reasoner') {
                        systemPrompt = prefs.reasoningPrompt;
                    } else {
                        systemPrompt = prefs.thinkingPrompt;
                    }

                    const userContent = typedDisplay.textContent.trim();
                    
                    if (imageB64) {
                        response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: systemPrompt + "\n\n" + userContent }, { inlineData: { mimeType: "image/jpeg", data: imageB64 } }] }]
                            })
                        });
                    } else {
                        response = await fetch("https://api.deepseek.com/chat/completions", {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${prefs.apiKey}` },
                            body: JSON.stringify({ model: prefs.model, messages: [{ role: "user", content: systemPrompt + "\n\n" + userContent }] })
                        });
                    }

                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    const result = imageB64 ? data.candidates[0].content.parts[0].text : data.choices[0].message.content;
                    
                    history.push({ prompt: imageB64 ? "[Vision Task]" : userContent, response: result });
                    localStorage.setItem('aiHistory', JSON.stringify(history));
                    
                    typedDisplay.textContent = result;
                    apiStatus.textContent = "COMPLETE";
                    setTimeout(() => apiStatus.style.display = "none", 2000);
                    if (imageB64) stopCamera();
                } catch (e) {
                    apiStatus.textContent = "API ERROR";
                    setTimeout(() => apiStatus.style.display = "none", 3000);
                }
            };

            /* --- PREFERENCES ENGINE --- */
            const applyPrefs = () => {
                root.style.setProperty('--text-opacity', prefs.textOpacity / 100);
                root.style.setProperty('--kbd-opacity', prefs.kbdOpacity / 100);
                root.style.setProperty('--log-opacity', prefs.logOpacity / 100);
                root.style.setProperty('--cam-opacity', prefs.camOpacity / 100);
                root.style.setProperty('--pic-opacity', prefs.picOpacity / 100);
                
                document.getElementById('input-text-opacity').value = prefs.textOpacity;
                document.getElementById('label-text-opacity').textContent = prefs.textOpacity;
                document.getElementById('input-kbd-opacity').value = prefs.kbdOpacity;
                document.getElementById('label-kbd-opacity').textContent = prefs.kbdOpacity;
                document.getElementById('input-cam-opacity').value = prefs.camOpacity;
                document.getElementById('label-cam-opacity').textContent = prefs.camOpacity;
                document.getElementById('input-pic-opacity').value = prefs.picOpacity;
                document.getElementById('label-pic-opacity').textContent = prefs.picOpacity;
                document.getElementById('input-log-opacity').value = prefs.logOpacity;
                document.getElementById('label-log-opacity').textContent = prefs.logOpacity;
                
                document.getElementById('input-overlay-toggle').checked = prefs.overlay;
                document.getElementById('input-api-key').value = prefs.apiKey;
                document.getElementById('input-model-mode').value = prefs.model;
                
                document.getElementById('prompt-thinking').value = prefs.thinkingPrompt;
                document.getElementById('prompt-reasoning').value = prefs.reasoningPrompt;
                document.getElementById('prompt-camera').value = prefs.cameraPrompt;
                
                const backgroundVisible = (isKeyboardMode || isLogMode) ? prefs.overlay : true;
                sciPad.style.opacity = backgroundVisible ? "1" : "0";
                sciPad.style.pointerEvents = backgroundVisible ? "auto" : "none";
                updateCameraHelpers();
            };

            /* --- EVENT HANDLERS --- */
            toggleKeyboardBtn.onclick = () => { isKeyboardMode = !isKeyboardMode; isLogMode = false; logPad.classList.remove('active'); kbdGrid.classList.toggle('active', isKeyboardMode); helpers.forEach(h => h.style.display = isKeyboardMode ? 'block' : 'none'); if (isCameraOn) stopCamera(); applyPrefs(); if (isKeyboardMode) renderKeyboard(); };
            toggleLogBtn.onclick = () => { isLogMode = !isLogMode; isKeyboardMode = false; kbdGrid.classList.remove('active'); logPad.classList.toggle('active', isLogMode); helpers.forEach(h => h.style.display = isLogMode ? 'block' : 'none'); applyPrefs(); if (isLogMode) renderLog(); };

            const renderLog = () => {
                logPad.innerHTML = history.length === 0 ? '<div style="opacity:0.3; text-align:center; margin-top:30px; color:white;">no log yet</div>' : '';
                history.slice().reverse().forEach(entry => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    div.innerHTML = `<div class="log-prompt">SENT</div><div class="log-response">${entry.prompt}</div><div class="log-prompt" style="margin-top:10px;">RECV</div><div class="log-response">${entry.response}</div>`;
                    logPad.appendChild(div);
                });
            };

            const renderKeyboard = () => {
                kbdContent.innerHTML = '';
                const layout = [["q","w","e","r","t","y","u","i","o","p"],["a","s","d","f","g","h","j","k","l"],["SHIFT","z","x","c","v","b","n","m","BS"],["123","SPACE","RETURN"]];
                layout.forEach((row) => {
                    const div = document.createElement('div');
                    div.className = 'kbd-row';
                    row.forEach(key => {
                        const btn = document.createElement('button');
                        btn.className = 'calc-btn kbd-btn';
                        if (key === 'SHIFT') btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M12 4l-8 8h5v8h6v-8h5z" fill="currentColor"/></svg>`;
                        else if (key === 'BS') btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L.37 12l5.04 8.12c.36.53.9.88 1.59.88h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" fill="currentColor"/></svg>`;
                        else btn.textContent = key;
                        btn.onclick = (e) => { e.preventDefault(); handleKbdPress(key); };
                        div.appendChild(btn);
                    });
                    kbdContent.appendChild(div);
                });
            };

            const handleKbdPress = (key) => {
                if (key === 'BS') { const t = typedDisplay.textContent; if (t.length > 0) typedDisplay.textContent = t.slice(0, -1); }
                else if (key === 'SPACE') typedDisplay.appendChild(document.createTextNode(' '));
                else if (key === 'RETURN') typedDisplay.appendChild(document.createTextNode('\n'));
                else if (!['SHIFT','123'].includes(key)) typedDisplay.appendChild(document.createTextNode(key));
                typedDisplay.scrollTop = typedDisplay.scrollHeight;
            };

            document.querySelectorAll('.calc-btn').forEach(btn => {
                btn.onclick = () => {
                    const label = btn.getAttribute('aria-label');
                    const textNode = btn.childNodes[0];
                    const text = textNode ? textNode.textContent.trim() : "";
                    if (btn.classList.contains('kbd-btn')) return;

                    if (isKeyboardMode) {
                        if (text === '0') { if (!isCameraOn) startCamera(); else if (!isPhotoTaken) capturePhoto(); return; }
                        if (text === '.') { if (isCameraOn) stopCamera(); return; }
                        if (text === '+') { if (isPhotoTaken) { const b64 = photoPreview.src.split(',')[1]; callDeepSeek(b64); } else callDeepSeek(); return; }
                        if (text === '-') { if (isPhotoTaken) retakePhoto(); return; }
                        if (isCameraOn && !isPhotoTaken) return; 
                    }

                    if (isKeyboardMode || isLogMode) {
                        if (label === 'Backspace') { const t = typedDisplay.textContent; if (t.length > 0) typedDisplay.textContent = t.slice(0, -1); }
                        else if (text === 'AC') { typedDisplay.textContent = ''; }
                        else if (text === '=') typedDisplay.appendChild(document.createTextNode('\n'));
                        else if (text === '%') typedDisplay.textContent = '';
                        else if (text === '÷') settingsPanel.style.display = 'flex';
                        else if (/[0-9]/.test(text)) typedDisplay.appendChild(document.createTextNode(text));
                        return;
                    }

                    const updateD = () => { let s = currentInput; if (s.length > 10 && !s.includes('e')) s = s.substring(0, 10); display.textContent = s; };
                    if (label === 'Backspace') { if (!waitingForNewValue) currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0'; updateD(); }
                    else if (text === 'AC') { 
                        currentInput = '0'; previousInput = ''; operator = null; waitingForNewValue = false; 
                        typedDisplay.textContent = ''; 
                        updateD(); 
                    }
                    else if (/[0-9]/.test(text)) { currentInput = (waitingForNewValue || currentInput === '0') ? text : currentInput + text; waitingForNewValue = false; updateD(); }
                };
            });

            /* --- SETTINGS PERSISTENCE --- */
            document.getElementById('input-text-opacity').oninput = (e) => { prefs.textOpacity = e.target.value; applyPrefs(); localStorage.setItem('textOpacity', prefs.textOpacity); };
            document.getElementById('input-kbd-opacity').oninput = (e) => { prefs.kbdOpacity = e.target.value; applyPrefs(); localStorage.setItem('kbdOpacity', prefs.kbdOpacity); };
            document.getElementById('input-cam-opacity').oninput = (e) => { prefs.camOpacity = e.target.value; applyPrefs(); localStorage.setItem('camOpacity', prefs.camOpacity); };
            document.getElementById('input-pic-opacity').oninput = (e) => { prefs.picOpacity = e.target.value; applyPrefs(); localStorage.setItem('picOpacity', prefs.picOpacity); };
            document.getElementById('input-log-opacity').oninput = (e) => { prefs.logOpacity = e.target.value; applyPrefs(); localStorage.setItem('logOpacity', prefs.logOpacity); };
            document.getElementById('input-overlay-toggle').onchange = (e) => { prefs.overlay = e.target.checked; applyPrefs(); localStorage.setItem('overlay', prefs.overlay); };
            document.getElementById('input-api-key').oninput = (e) => { prefs.apiKey = e.target.value; localStorage.setItem('deepseekKey', prefs.apiKey); };
            document.getElementById('input-model-mode').onchange = (e) => { prefs.model = e.target.value; localStorage.setItem('deepseekModel', prefs.model); };
            
            document.getElementById('prompt-thinking').oninput = (e) => { prefs.thinkingPrompt = e.target.value; localStorage.setItem('promptThinking', prefs.thinkingPrompt); };
            document.getElementById('prompt-reasoning').oninput = (e) => { prefs.reasoningPrompt = e.target.value; localStorage.setItem('promptReasoning', prefs.reasoningPrompt); };
            document.getElementById('prompt-camera').oninput = (e) => { prefs.cameraPrompt = e.target.value; localStorage.setItem('promptCamera', prefs.cameraPrompt); };

            document.getElementById('close-settings-btn').onclick = () => settingsPanel.style.display = 'none';

            applyPrefs();
            display.textContent = '0';
        });
    </script>
</body>
</html>

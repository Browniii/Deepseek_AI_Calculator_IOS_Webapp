<!DOCTYPE html>
<html lang="en">
<head>
    <!-- iOS SAFARI STANDALONE OPTIMIZATION -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    <meta name="theme-color" content="#000000">
    <title>Calculator</title>

    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            /* iOS Calculator Colors */
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --sci-dark-grey: #1A1A1A;
            --action-grey: #525252;
            --number-grey: #2B2B2B;
            --operator-orange: #FF9300;

            /* Reference dimensions for iPhone 13 (1170x2532) */
            --ref-w: 1170;
            --ref-h: 2532;

            /* Aspect-ratio based spacing/sizes using cqw/cqh */
            --gap-btn: calc((24 / var(--ref-w)) * 100cqw); 
            --pad-top: 0;
            --pad-side: calc((50 / var(--ref-w)) * 100cqw);
            --header-btn-size: calc((120 / var(--ref-w)) * 100cqw);
            --pad-bottom: calc((186 / var(--ref-h)) * 100cqh);
            --btn-height: calc((144 / var(--ref-h)) * 100cqh);
            --btn-lower-w: calc((250 / var(--ref-w)) * 100cqw);
            --btn-upper-w: calc((160 / var(--ref-w)) * 100cqw);
            
            /* Text sizes scaled by width ratio */
            --font-screen: calc((154 / var(--ref-w)) * 100cqw);
            --font-num: calc((52 / var(--ref-w)) * 100cqw); 
            --font-action: calc((62 / var(--ref-w)) * 100cqw);
            --font-upper: calc((37 / var(--ref-w)) * 100cqw); 
            --font-pm: calc((81 / var(--ref-w)) * 100cqw);

            /* Dynamic Opacity Vars */
            --kbd-opacity: 0.10;
            --text-opacity: 0.20;
            --log-opacity: 0.10;
            --cam-opacity: 0.10;
            --pic-opacity: 0.15;
        }

        /* --- SLEEK MODERN SCROLLBARS --- */
        /* Global ultra-thin scrollbar for main views */
        ::-webkit-scrollbar {
            width: 3px; height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        html, body {
            margin: 0; padding: 0;
            background-color: #000000; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            color: var(--text-color);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; user-select: none; -webkit-user-select: none;
            touch-action: none; /* Disable all zooming and panning on document body */
        }

        /* Container ensures calculator maintains phone proportions */
        #calculator-app {
            container-type: size;
            width: 100%; height: 100%;
            max-width: 450px; max-height: 974px; 
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            box-sizing: border-box;
            padding-bottom: var(--pad-bottom); 
            position: relative;
            overflow: hidden;
        }

        /* --- VISUAL OVERLAYS (Camera & Photo) --- */
        #camera-view, #photo-preview {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 50; pointer-events: none;
        }
        #camera-view.active { display: block; opacity: var(--cam-opacity); }
        #photo-preview.active { display: block; opacity: var(--pic-opacity); }

        /* UI Indicators */
        #camera-indicator {
            position: absolute; top: 50px; left: 50%;
            transform: translateX(-50%); font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; opacity: 0; color: var(--operator-orange);
            z-index: 100; transition: opacity 0.3s;
        }
        #camera-indicator.visible { opacity: 0.8; }

        /* --- OVERLAY PANELS (Apple-Level Glassmorphism) --- */
        @keyframes modalSlideUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .overlay-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.65); z-index: 1000;
            backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            display: none; flex-direction: column; padding: 10% 6%;
            box-sizing: border-box; overflow-y: auto; -webkit-overflow-scrolling: touch;
            animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            touch-action: pan-y;
            scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }
        .settings-header { 
            font-size: 28px; font-weight: 800; margin-bottom: 25px; text-align: center; 
            background: linear-gradient(135deg, #ffffff, #aaaaaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .setting-item { 
            margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; 
            background: rgba(45, 45, 45, 0.4); padding: 16px; 
            border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 8px 20px rgba(0,0,0,0.2);
        }
        .setting-item label { 
            font-size: 11px; font-weight: 700; opacity: 0.6; text-transform: uppercase; 
            letter-spacing: 1px; color: #fff; margin-bottom: 4px;
        }
        
        /* Modern Apple-like Inputs */
        .setting-item input[type="text"], .setting-item input[type="password"], .setting-item select, .setting-item textarea {
            width: 100%; background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.05); 
            color: white; padding: 12px 14px; border-radius: 12px; font-size: 14px; outline: none; 
            transition: all 0.3s ease; box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); box-sizing: border-box;
        }
        .setting-item input:focus, .setting-item select:focus, .setting-item textarea:focus {
            border-color: rgba(255, 147, 0, 0.6); box-shadow: inset 0 2px 5px rgba(0,0,0,0.3), 0 0 0 3px rgba(255, 147, 0, 0.15); background: rgba(0,0,0,0.4);
        }
        
        /* Specialized inside-textarea scrollbar to prevent cutting off at rounded corners */
        .setting-item textarea { 
            height: 80px; resize: none; font-family: inherit; font-size: 13px; line-height: 1.4; 
        }
        .setting-item textarea::-webkit-scrollbar {
            width: 14px; /* Wider to allow border hack */
        }
        .setting-item textarea::-webkit-scrollbar-track {
            background: transparent;
            margin: 6px 0; /* Keeps track away from top/bottom rounded corners */
        }
        .setting-item textarea::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
            border: 4px solid transparent; /* Transparent border creates padding inside the track */
            background-clip: padding-box;
        }
        .setting-item textarea::-webkit-scrollbar-thumb:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .setting-item.row { flex-direction: row; justify-content: space-between; align-items: center; }
        
        /* Modern Toggle Switch */
        input[type="checkbox"] {
            -webkit-appearance: none; appearance: none;
            width: 50px; height: 30px; background: rgba(255,255,255,0.15);
            border-radius: 30px; position: relative; cursor: pointer; outline: none; transition: background 0.3s;
            margin: 0; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        input[type="checkbox"]::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px;
            background: white; border-radius: 50%; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        input[type="checkbox"]:checked { background: var(--operator-orange); }
        input[type="checkbox"]:checked::after { transform: translateX(20px); }

        /* Modern Range Slider */
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255, 255, 255, 0.15); border-radius: 5px; outline: none; margin: 10px 0; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);}
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }

        .close-btn { margin-top: 10px; background: linear-gradient(135deg, var(--operator-orange), #E68400); border: none; color: white; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; flex-shrink: 0; box-shadow: 0 8px 20px rgba(255, 147, 0, 0.25); transition: transform 0.2s, box-shadow 0.2s; }
        .close-btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(255, 147, 0, 0.2); }

        /* History Log View */
        #log-pad {
            position: absolute; top: 0; left: 0; width: 100%; 
            height: calc((var(--btn-height) * 5) + (var(--gap-btn) * 4)); 
            display: none; flex-direction: column; z-index: 6;
            padding: 0 var(--pad-side); box-sizing: border-box;
            overflow-y: auto; opacity: var(--log-opacity);
            touch-action: pan-y; scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }
        #log-pad.active { display: flex; }
        .log-entry { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .log-prompt { color: var(--operator-orange); font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .log-response { color: white; font-size: 13px; line-height: 1.4; white-space: pre-wrap; }

        /* Header / Nav UI */
        .header { display: flex; justify-content: space-between; align-items: center; padding-top: 50px; padding-left: var(--pad-side); padding-right: var(--pad-side); width: 100%; box-sizing: border-box; z-index: 10; }
        .header-btn { width: var(--header-btn-size); height: var(--header-btn-size); background-color: var(--sci-dark-grey); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; cursor: pointer; color: #FFFFFF; }
        .header-btn svg { width: 50%; height: 50%; stroke: currentColor; fill: none; stroke-width: 1.5; }

        /* Output Displays */
        .display-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 0 var(--pad-side) 2cqh var(--pad-side); overflow: hidden; z-index: 10; touch-action: pan-y; }
        
        /* Fixed: strictly no horizontal scroll and clean word wrapping */
        .typed-text-display { 
            width: 100%; 
            color: rgba(255, 255, 255, var(--text-opacity)); 
            font-size: calc(var(--font-screen) * 0.22); 
            line-height: 1.3; 
            text-align: right; 
            max-height: 4.5em; 
            overflow-y: auto; 
            overflow-x: hidden; 
            word-break: break-word; 
            white-space: pre-wrap; 
            margin-bottom: 8px; 
            outline: none; 
            user-select: text; 
            -webkit-user-select: text; 
            caret-color: transparent; 
            touch-action: pan-y;
            scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }
        .typed-text-display:focus { caret-color: #FFFFFF; } 

        /* FIX: Increased letter spacing slightly to feel relaxed and modern */
        .screen { font-size: var(--font-screen); font-weight: 300; line-height: 1; margin: 0; letter-spacing: 0.5px; color: #FFFFFF; transition: font-size 0.2s ease-out; }

        /* Keypads */
        .keypad { display: flex; flex-direction: column; gap: var(--gap-btn); margin-top: auto; position: relative; z-index: 10; }
        
        /* Fancy Interactive Animations for Buttons */
        .calc-btn { 
            border: none; outline: none; cursor: pointer; color: #FFFFFF; 
            border-radius: 100px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            height: var(--btn-height); position: relative; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            touch-action: manipulation; /* Block double tap zoom on buttons */
        }
        .calc-btn:active { 
            transform: scale(0.85); 
            filter: brightness(1.4); 
        }
        .calc-btn svg { width: 45%; height: 45%; stroke: currentColor; fill: none; stroke-width: 1.5; }
        .helper-text { position: absolute; bottom: 10%; font-size: 9px; text-transform: lowercase; opacity: 0.25; display: none; }

        /* Scientific Grid Enhancements */
        .scientific-grid { display: grid; grid-template-columns: repeat(6, var(--btn-upper-w)); justify-content: center; gap: var(--gap-btn); transition: opacity 0.3s; }
        .sci-btn { background-color: var(--sci-dark-grey); width: var(--btn-upper-w); font-size: var(--font-upper); white-space: nowrap; }
        .sci-btn sup, .sci-btn sub { font-size: 0.6em; pointer-events: none; }
        
        /* 2nd Button vertical stacking layout */
        .stacked-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 0.9; }
        .stacked-btn span:first-child { font-size: 1em; transform: translateY(2px); }
        .stacked-btn span:last-child { font-size: 0.65em; transform: translateY(-2px); }

        .basic-grid { display: grid; grid-template-columns: repeat(4, var(--btn-lower-w)); justify-content: center; gap: var(--gap-btn); }
        .btn-action { background-color: var(--action-grey); font-size: var(--font-action); }
        .btn-number { background-color: var(--number-grey); font-size: var(--font-num); }
        .btn-operator { background-color: var(--operator-orange); font-size: var(--font-action); }

        /* --- LIQUID GLASS MODE --- */
        /* Applies intense blur, saturation, and dynamic lighting borders */
        .liquid-glass-mode .calc-btn, 
        .liquid-glass-mode .header-btn,
        .liquid-glass-mode .overlay-panel {
            background-color: rgba(30, 30, 30, 0.4) !important;
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #FFFFFF !important;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .liquid-glass-mode .btn-operator {
            background-color: rgba(255, 147, 0, 0.4) !important;
            border-color: rgba(255, 147, 0, 0.5) !important;
        }
        .liquid-glass-mode .btn-action {
            background-color: rgba(255, 255, 255, 0.2) !important;
        }
        .liquid-glass-mode .kbd-btn.shift-active {
            background-color: rgba(255, 255, 255, 0.5) !important;
        }
        .liquid-glass-mode .kbd-btn {
            background-color: rgba(30, 30, 30, 0.4) !important;
        }

        /* --- MODE OVERRIDES --- */
        .camera-essential { z-index: 60 !important; }
        .keyboard-hidden { opacity: 0 !important; pointer-events: none !important; }

        .keyboard-grid { position: absolute; top: 0; left: 0; width: 100%; display: none; flex-direction: column; gap: var(--gap-btn); opacity: var(--kbd-opacity); padding-left: var(--pad-side); padding-right: var(--pad-side); box-sizing: border-box; height: calc((var(--btn-height) * 5) + (var(--gap-btn) * 4)); justify-content: center; z-index: 5; pointer-events: none; }
        .keyboard-grid.active { display: flex; pointer-events: auto; }
        .kbd-row { display: flex; justify-content: center; gap: calc(var(--gap-btn) * 0.35); height: calc(var(--btn-height) * 0.85); }
        .kbd-btn { background-color: var(--sci-dark-grey); border-radius: calc(var(--btn-height) * 0.2); flex: 1; font-size: calc(var(--font-upper) * 1.25); text-transform: lowercase; font-weight: 400; color: #FFF; pointer-events: auto; }
        .kbd-btn.shift-active { background-color: #FFFFFF; color: #000000; }
        
        #api-status { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 10px; opacity: 0.8; letter-spacing: 1.2px; display: none; color: var(--operator-orange); font-weight: bold; width: 80%; text-align: center; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="calculator-app">
        <!-- Live Video & Result Previews -->
        <video id="camera-view" autoplay playsinline></video>
        <img id="photo-preview" src="">
        
        <div id="camera-indicator">camera mode</div>
        <div id="api-status">THINKING...</div>

        <!-- SETTINGS PANEL -->
        <div id="settings-panel" class="overlay-panel">
            <div class="settings-header">Preferences</div>
            <div class="setting-item">
                <label>DeepSeek API Key</label>
                <input type="password" id="input-api-key" placeholder="Paste your key here">
            </div>
            <div class="setting-item">
                <label>Model Mode</label>
                <select id="input-model-mode">
                    <option value="deepseek-reasoner">Reasoning (Reasoner)</option>
                    <option value="deepseek-chat">Thinking (Chat)</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label>Thinking Instructions (Chat)</label>
                <textarea id="prompt-thinking" placeholder="Instructions..."></textarea>
            </div>
            <div class="setting-item">
                <label>Reasoning Instructions (Reasoner)</label>
                <textarea id="prompt-reasoning" placeholder="Instructions..."></textarea>
            </div>
            <div class="setting-item">
                <label>Camera/Vision Instructions</label>
                <textarea id="prompt-camera" placeholder="Instructions..."></textarea>
            </div>

            <!-- NEW CAMERA HARDWARE SETTINGS -->
            <div class="setting-item">
                <label>Camera Aspect Ratio</label>
                <select id="input-cam-ratio">
                    <option value="4:3">4:3 (Standard Photo)</option>
                    <option value="16:9">16:9 (Widescreen)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Camera Hardware Zoom (If Supported)</label>
                <select id="input-cam-zoom">
                    <option value="0.5">0.5x (Ultra-wide)</option>
                    <option value="1">1x (Standard)</option>
                    <option value="2">2x (Telephoto)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Camera View Fit</label>
                <select id="input-cam-fit">
                    <option value="cover">Fill Screen</option>
                    <option value="contain">Fit to Screen</option>
                </select>
            </div>

            <div class="setting-item">
                <label>Text Above Opacity: <span id="label-text-opacity">20</span>%</label>
                <input type="range" id="input-text-opacity" min="0" max="100" value="20">
            </div>
            <div class="setting-item">
                <label>Keyboard Opacity: <span id="label-kbd-opacity">10</span>%</label>
                <input type="range" id="input-kbd-opacity" min="0" max="100" value="10">
            </div>
            <div class="setting-item">
                <label>Camera Opacity: <span id="label-cam-opacity">10</span>%</label>
                <input type="range" id="input-cam-opacity" min="0" max="100" value="10">
            </div>
            <div class="setting-item">
                <label>Picture Opacity: <span id="label-pic-opacity">15</span>%</label>
                <input type="range" id="input-pic-opacity" min="0" max="100" value="15">
            </div>
            <div class="setting-item">
                <label>History Log Opacity: <span id="label-log-opacity">10</span>%</label>
                <input type="range" id="input-log-opacity" min="0" max="100" value="10">
            </div>
            <div class="setting-item row">
                <label>Overlay Active</label>
                <input type="checkbox" id="input-overlay-toggle">
            </div>
            <div class="setting-item row">
                <label>Liquid Glass Mode</label>
                <input type="checkbox" id="input-glass-toggle">
            </div>
            <button class="close-btn" id="close-settings-btn">Done</button>
        </div>

        <!-- HEADER UI -->
        <div class="header">
            <button class="header-btn" id="toggle-log-btn" aria-label="History Log">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 15 14"></polyline></svg>
            </button>
            <button class="header-btn" id="toggle-keyboard-btn" aria-label="Math Notes">
                <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2" ry="2"></rect><line x1="8" y1="8" x2="16" y2="8"></line><circle cx="8" cy="13" r="1" fill="currentColor"></circle><circle cx="12" cy="13" r="1" fill="currentColor"></circle><circle cx="16" cy="13" r="1" fill="currentColor"></circle><circle cx="8" cy="17" r="1" fill="currentColor"></circle><circle cx="12" cy="17" r="1" fill="currentColor"></circle><circle cx="16" cy="17" r="1" fill="currentColor"></circle></svg>
            </button>
        </div>

        <!-- DYNAMIC DISPLAYS -->
        <div class="display-container">
            <div class="typed-text-display" id="typed-display" contenteditable="true" spellcheck="false"></div>
            <div class="screen" id="display">0</div>
        </div>

        <!-- KEYPADS -->
        <div class="keypad">
            <div class="scientific-grid" id="scientific-pad">
                <!-- Row 1 -->
                <button class="calc-btn sci-btn">(</button>
                <button class="calc-btn sci-btn">)</button>
                <button class="calc-btn sci-btn">mc</button>
                <button class="calc-btn sci-btn">m+</button>
                <button class="calc-btn sci-btn">m-</button>
                <button class="calc-btn sci-btn">mr</button>
                
                <!-- Row 2 -->
                <button class="calc-btn sci-btn stacked-btn" id="btn-2nd">
                    <span>2</span><span>nd</span>
                </button>
                <button class="calc-btn sci-btn">x<sup>2</sup></button>
                <button class="calc-btn sci-btn">x<sup>3</sup></button>
                <button class="calc-btn sci-btn">x<sup>y</sup></button>
                <button class="calc-btn sci-btn" id="btn-ex">e<sup>x</sup></button>
                <button class="calc-btn sci-btn" id="btn-10x">10<sup>x</sup></button>
                
                <!-- Row 3 -->
                <button class="calc-btn sci-btn" id="btn-1x">
                    <sup>1</sup><span style="font-size:1.2em; font-weight:300; margin: 0 -2px;">/</span><sub>x</sub>
                </button>
                <button class="calc-btn sci-btn"><sup>2</sup>√x</button>
                <button class="calc-btn sci-btn"><sup>3</sup>√x</button>
                <button class="calc-btn sci-btn"><sup>y</sup>√x</button>
                <button class="calc-btn sci-btn" id="btn-ln">ln</button>
                <button class="calc-btn sci-btn" id="btn-log">log<sub>10</sub></button>
                
                <!-- Row 4 -->
                <button class="calc-btn sci-btn">x!</button>
                <button class="calc-btn sci-btn" id="btn-sin">sin</button>
                <button class="calc-btn sci-btn" id="btn-cos">cos</button>
                <button class="calc-btn sci-btn" id="btn-tan">tan</button>
                <button class="calc-btn sci-btn">e</button>
                <button class="calc-btn sci-btn">EE</button>
                
                <!-- Row 5 -->
                <button class="calc-btn sci-btn">Rand</button>
                <button class="calc-btn sci-btn" id="btn-sinh">sinh</button>
                <button class="calc-btn sci-btn" id="btn-cosh">cosh</button>
                <button class="calc-btn sci-btn" id="btn-tanh">tanh</button>
                <button class="calc-btn sci-btn">π</button>
                <button class="calc-btn sci-btn" id="btn-rad">Rad</button>
            </div>
            
            <div id="log-pad"></div>
            <div class="keyboard-grid" id="keyboard-grid">
                <div id="kbd-layout-content" style="display:contents"></div>
            </div>
            
            <!-- Standard numeric pad -->
            <div class="basic-grid">
                <button class="calc-btn basic-btn btn-action" aria-label="Backspace"><svg viewBox="0 0 24 24"><path d="M 8 6 H 19 C 20.1 6 21 6.9 21 8 V 16 C 21 17.1 20.1 18 19 18 H 8 L 3 12 Z" stroke-linejoin="round"></path><line x1="11" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="11" y2="15"></line></svg></button>
                <button class="calc-btn basic-btn btn-action" id="btn-ac">AC<span class="helper-text">space</span></button>
                <button class="calc-btn basic-btn btn-action">%<span class="helper-text">clear</span></button>
                <button class="calc-btn basic-btn btn-operator" id="btn-settings-trigger">÷<span class="helper-text">settings</span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-7">7</button><button class="calc-btn basic-btn btn-number" id="btn-8">8</button><button class="calc-btn basic-btn btn-number" id="btn-9">9</button><button class="calc-btn basic-btn btn-operator">×</button>
                <button class="calc-btn basic-btn btn-number" id="btn-4">4</button><button class="calc-btn basic-btn btn-number" id="btn-5">5</button><button class="calc-btn basic-btn btn-number" id="btn-6">6</button>
                <button class="calc-btn basic-btn btn-operator" id="btn-minus">-<span class="helper-text" id="helper-minus"></span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-1">1</button><button class="calc-btn basic-btn btn-number" id="btn-2">2</button><button class="calc-btn basic-btn btn-number" id="btn-3">3</button>
                <button class="calc-btn basic-btn btn-operator" id="btn-plus">+<span class="helper-text" id="helper-plus">send</span></button>
                <button class="calc-btn basic-btn btn-number btn-plus-minus" aria-label="Plus Minus"><svg viewBox="0 0 40 40"><path d="M 10 14 L 18 14 M 14 10 L 14 18" stroke-width="2.5" stroke-linecap="round"/><line x1="13" y1="28" x2="27" y2="12" stroke-width="2.5" stroke-linecap="round"/><line x1="22" y1="26" x2="30" y2="26" stroke-width="2.5" stroke-linecap="round"/></svg></button>
                <button class="calc-btn basic-btn btn-number" id="btn-0">0<span class="helper-text" id="helper-0"></span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-dot">.<span class="helper-text" id="helper-dot"></span></button>
                <button class="calc-btn basic-btn btn-operator" id="btn-equals">=<span class="helper-text">return</span></button>
            </div>
        </div>
    </div>

    <!-- MAIN APPLICATION SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* --- ELEMENT DEFINITIONS --- */
            const video = document.getElementById('camera-view');
            const photoPreview = document.getElementById('photo-preview');
            const indicator = document.getElementById('camera-indicator');
            const display = document.getElementById('display');
            const typedDisplay = document.getElementById('typed-display');
            const toggleKeyboardBtn = document.getElementById('toggle-keyboard-btn');
            const toggleLogBtn = document.getElementById('toggle-log-btn');
            const sciPad = document.getElementById('scientific-pad');
            const kbdGrid = document.getElementById('keyboard-grid');
            const logPad = document.getElementById('log-pad');
            const kbdContent = document.getElementById('kbd-layout-content');
            const helpers = document.querySelectorAll('.helper-text');
            const settingsPanel = document.getElementById('settings-panel');
            const apiStatus = document.getElementById('api-status');
            const appWrapper = document.getElementById('calculator-app');
            const root = document.documentElement;

            /* --- GLOBAL APP STATE --- */
            let history = JSON.parse(localStorage.getItem('aiHistory')) || [];
            let currentInput = '0', previousInput = '', operator = null, waitingForNewValue = false;
            let isKeyboardMode = false, isLogMode = false, isShift = false, keyboardState = 'alpha';
            let isCameraOn = false, isPhotoTaken = false, stream = null;
            
            // Scientific State
            let memoryValue = 0;
            let isDegrees = true;
            let is2nd = false;
            let bracketStack = [];

            /* --- USER PREFERENCES --- */
            const prefs = {
                textOpacity: localStorage.getItem('textOpacity') || 20,
                kbdOpacity: localStorage.getItem('kbdOpacity') || 10,
                logOpacity: localStorage.getItem('logOpacity') || 10,
                camOpacity: localStorage.getItem('camOpacity') || 10,
                picOpacity: localStorage.getItem('picOpacity') || 15,
                overlay: localStorage.getItem('overlay') === null ? true : localStorage.getItem('overlay') === 'true',
                glassMode: localStorage.getItem('glassMode') === 'true' || false,
                apiKey: localStorage.getItem('deepseekKey') || "",
                model: localStorage.getItem('deepseekModel') || "deepseek-reasoner",
                thinkingPrompt: localStorage.getItem('promptThinking') || "Analyze the query and provide the most correct and concise answer. If it contains math, solve using Python logic. Think in thought about the answer deeply. Provide a short but most correct and concise answer, then explain why later.",
                reasoningPrompt: localStorage.getItem('promptReasoning') || "Think deeply and provide the most correct and concise answer. If math, use Python logic. Explain the logic clearly after providing the result.",
                cameraPrompt: localStorage.getItem('promptCamera') || "Analyze this image and provide a concise and most correct answer for each question in the image. If it contains math, solve using Python logic. If it is hard to read important text, such as being cut off or too blurry, ask the user to retake the image. Think in thought about the answer deeply. To answer, first provide question number if the question has the question number, then ABCD if multiple choice, for short but most correct and concise answer for written answer, repeat for all questions- then explain why later.",
                camRatio: localStorage.getItem('camRatio') || "4:3",
                camZoom: localStorage.getItem('camZoom') || "1",
                camFit: localStorage.getItem('camFit') || "cover"
            };

            /* --- UI ENGINE --- */
            const updateD = () => { 
                let s = currentInput; 
                // Allow longer string representation before raw cut off
                if (s.length > 15 && !s.includes('e')) s = s.substring(0, 15); 
                display.textContent = s; 
                
                // Auto-adjust scale only when number hits the left padding edge (approx 9 digits)
                if (s.length > 9) {
                    display.style.fontSize = `calc(var(--font-screen) * ${9 / s.length})`;
                } else {
                    display.style.fontSize = 'var(--font-screen)';
                }
            };

            const applyPrefs = () => {
                root.style.setProperty('--text-opacity', prefs.textOpacity / 100);
                root.style.setProperty('--kbd-opacity', prefs.kbdOpacity / 100);
                root.style.setProperty('--log-opacity', prefs.logOpacity / 100);
                root.style.setProperty('--cam-opacity', prefs.camOpacity / 100);
                root.style.setProperty('--pic-opacity', prefs.picOpacity / 100);
                
                document.getElementById('input-text-opacity').value = prefs.textOpacity;
                document.getElementById('label-text-opacity').textContent = prefs.textOpacity;
                document.getElementById('input-kbd-opacity').value = prefs.kbdOpacity;
                document.getElementById('label-kbd-opacity').textContent = prefs.kbdOpacity;
                document.getElementById('input-cam-opacity').value = prefs.camOpacity;
                document.getElementById('label-cam-opacity').textContent = prefs.camOpacity;
                document.getElementById('input-pic-opacity').value = prefs.picOpacity;
                document.getElementById('label-pic-opacity').textContent = prefs.picOpacity;
                document.getElementById('input-log-opacity').value = prefs.logOpacity;
                document.getElementById('label-log-opacity').textContent = prefs.logOpacity;
                
                document.getElementById('input-overlay-toggle').checked = prefs.overlay;
                document.getElementById('input-glass-toggle').checked = prefs.glassMode;
                document.getElementById('input-api-key').value = prefs.apiKey;
                document.getElementById('input-model-mode').value = prefs.model;
                
                document.getElementById('prompt-thinking').value = prefs.thinkingPrompt;
                document.getElementById('prompt-reasoning').value = prefs.reasoningPrompt;
                document.getElementById('prompt-camera').value = prefs.cameraPrompt;

                document.getElementById('input-cam-ratio').value = prefs.camRatio;
                document.getElementById('input-cam-zoom').value = prefs.camZoom;
                document.getElementById('input-cam-fit').value = prefs.camFit;
                
                video.style.objectFit = prefs.camFit;
                photoPreview.style.objectFit = prefs.camFit;
                
                const backgroundVisible = (isKeyboardMode || isLogMode) ? prefs.overlay : true;
                sciPad.style.opacity = backgroundVisible ? "1" : "0";
                sciPad.style.pointerEvents = backgroundVisible ? "auto" : "none";
                updateCameraHelpers();
                updateGlassMode();
            };

            const updateGlassMode = () => {
                // Liquid glass applies to the entire UI regardless of camera state
                if (prefs.glassMode) {
                    appWrapper.classList.add('liquid-glass-mode');
                } else {
                    appWrapper.classList.remove('liquid-glass-mode');
                }
            }

            /* --- CAMERA ENGINE --- */
            const stopStream = () => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
            };

            const startCamera = async () => {
                try {
                    const ratioVal = prefs.camRatio === '4:3' ? 4/3 : 16/9;
                    const constraints = {
                        video: {
                            facingMode: 'environment',
                            aspectRatio: { ideal: ratioVal }
                        }
                    };
                    
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    
                    // Try to apply hardware zoom if supported by the browser track
                    try {
                        const track = stream.getVideoTracks()[0];
                        if (track.getCapabilities) {
                            const caps = track.getCapabilities();
                            if (caps.zoom) {
                                let z = parseFloat(prefs.camZoom);
                                // Ensure requested zoom is within hardware limits
                                const safeZoom = Math.max(caps.zoom.min, Math.min(z, caps.zoom.max));
                                await track.applyConstraints({ advanced: [{ zoom: safeZoom }] });
                            }
                        }
                    } catch (e) {
                        console.log("Hardware zoom constraints skipped or unsupported", e);
                    }

                    video.srcObject = stream;
                    video.classList.add('active');
                    indicator.classList.add('visible');
                    indicator.textContent = "camera mode";
                    isCameraOn = true;
                    isPhotoTaken = false;
                    photoPreview.classList.remove('active');
                    
                    kbdGrid.classList.add('keyboard-hidden');
                    bringEssentialsToFront(true);
                    updateCameraHelpers();
                    updateGlassMode();
                    typedDisplay.contentEditable = "false";
                } catch (err) {
                    apiStatus.textContent = "CAMERA ERROR";
                    apiStatus.style.display = "block";
                    setTimeout(() => apiStatus.style.display = "none", 2000);
                }
            };

            const capturePhoto = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                photoPreview.src = canvas.toDataURL('image/jpeg');
                
                // STOP the camera hardware immediately when in picture mode
                stopStream();
                video.srcObject = null;
                video.classList.remove('active');
                
                photoPreview.classList.add('active');
                indicator.textContent = "picture mode";
                isPhotoTaken = true;
                updateCameraHelpers();
                updateGlassMode();
            };

            const retakePhoto = async () => {
                photoPreview.classList.remove('active');
                await startCamera(); 
            };

            const stopCameraSystem = () => {
                stopStream();
                video.srcObject = null;
                video.classList.remove('active');
                photoPreview.classList.remove('active');
                indicator.classList.remove('visible');
                kbdGrid.classList.remove('keyboard-hidden');
                bringEssentialsToFront(false);
                
                isCameraOn = false;
                isPhotoTaken = false;
                updateCameraHelpers();
                updateGlassMode();
                typedDisplay.contentEditable = "true";
            };

            const bringEssentialsToFront = (active) => {
                const essentials = [
                    document.getElementById('btn-0'),
                    document.getElementById('btn-plus'),
                    document.getElementById('btn-minus'),
                    document.getElementById('btn-dot')
                ];
                essentials.forEach(btn => {
                    if (active) btn.classList.add('camera-essential');
                    else btn.classList.remove('camera-essential');
                });
                helpers.forEach(h => {
                    const parentId = h.parentElement.id;
                    if (active && !['btn-0', 'btn-plus', 'btn-minus', 'btn-dot'].includes(parentId)) {
                        h.style.visibility = 'hidden';
                    } else {
                        h.style.visibility = 'visible';
                    }
                });
            };

            const updateCameraHelpers = () => {
                const h0 = document.getElementById('helper-0');
                const hDot = document.getElementById('helper-dot');
                const hPlus = document.getElementById('helper-plus');
                const hMinus = document.getElementById('helper-minus');
                if (isKeyboardMode) {
                    h0.style.display = 'block'; hDot.style.display = 'block'; hPlus.style.display = 'block';
                    h0.textContent = !isCameraOn ? 'camera' : (isPhotoTaken ? '' : 'capture');
                    hDot.textContent = isCameraOn ? 'cancel' : '';
                    hPlus.textContent = isPhotoTaken ? 'solve' : 'send';
                    hMinus.textContent = isPhotoTaken ? 'retake' : '';
                    hMinus.style.display = isPhotoTaken ? 'block' : 'none';
                }
            };

            /* --- AI PIPELINE --- */
            const callDeepSeek = async (imageB64 = null) => {
                if (!prefs.apiKey) {
                    apiStatus.textContent = "input deepseek key in settings";
                    apiStatus.style.display = "block";
                    setTimeout(() => apiStatus.style.display = "none", 4000);
                    return;
                }

                apiStatus.textContent = "THINKING...";
                apiStatus.style.display = "block";

                try {
                    let response;
                    let systemPrompt;
                    if (imageB64) {
                        systemPrompt = prefs.cameraPrompt;
                    } else if (prefs.model === 'deepseek-reasoner') {
                        systemPrompt = prefs.reasoningPrompt;
                    } else {
                        systemPrompt = prefs.thinkingPrompt;
                    }

                    const userContent = typedDisplay.textContent.trim();
                    
                    if (imageB64) {
                        response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: systemPrompt + "\n\n" + userContent }, { inlineData: { mimeType: "image/jpeg", data: imageB64 } }] }]
                            })
                        });
                    } else {
                        response = await fetch("https://api.deepseek.com/chat/completions", {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${prefs.apiKey}` },
                            body: JSON.stringify({ model: prefs.model, messages: [{ role: "user", content: systemPrompt + "\n\n" + userContent }] })
                        });
                    }

                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    const result = imageB64 ? data.candidates[0].content.parts[0].text : data.choices[0].message.content;
                    
                    history.push({ prompt: imageB64 ? "[Vision Task]" : userContent, response: result });
                    localStorage.setItem('aiHistory', JSON.stringify(history));
                    
                    typedDisplay.textContent = result;
                    apiStatus.textContent = "COMPLETE";
                    setTimeout(() => apiStatus.style.display = "none", 2000);
                    if (imageB64) stopCameraSystem();
                } catch (e) {
                    apiStatus.textContent = "API ERROR";
                    setTimeout(() => apiStatus.style.display = "none", 3000);
                }
            };

            /* --- EVENT HANDLERS --- */
            toggleKeyboardBtn.onclick = () => { isKeyboardMode = !isKeyboardMode; isLogMode = false; logPad.classList.remove('active'); kbdGrid.classList.toggle('active', isKeyboardMode); helpers.forEach(h => h.style.display = isKeyboardMode ? 'block' : 'none'); if (isCameraOn) stopCameraSystem(); applyPrefs(); if (isKeyboardMode) renderKeyboard(); };
            toggleLogBtn.onclick = () => { isLogMode = !isLogMode; isKeyboardMode = false; kbdGrid.classList.remove('active'); logPad.classList.toggle('active', isLogMode); helpers.forEach(h => h.style.display = isLogMode ? 'block' : 'none'); if (isCameraOn) stopCameraSystem(); applyPrefs(); if (isLogMode) renderLog(); };

            const renderLog = () => {
                logPad.innerHTML = history.length === 0 ? '<div style="opacity:0.3; text-align:center; margin-top:30px; color:white;">no log yet</div>' : '';
                history.slice().reverse().forEach(entry => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    div.innerHTML = `<div class="log-prompt">SENT</div><div class="log-response">${entry.prompt}</div><div class="log-prompt" style="margin-top:10px;">RECV</div><div class="log-response">${entry.response}</div>`;
                    logPad.appendChild(div);
                });
            };

            const renderKeyboard = () => {
                kbdContent.innerHTML = '';
                const layout = [["q","w","e","r","t","y","u","i","o","p"],["a","s","d","f","g","h","j","k","l"],["SHIFT","z","x","c","v","b","n","m","BS"],["123","SPACE","RETURN"]];
                layout.forEach((row) => {
                    const div = document.createElement('div');
                    div.className = 'kbd-row';
                    row.forEach(key => {
                        const btn = document.createElement('button');
                        btn.className = 'calc-btn kbd-btn';
                        if (key === 'SHIFT') { btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M12 4l-8 8h5v8h6v-8h5z" fill="currentColor"/></svg>`; btn.classList.add('ctrl-key'); if (isShift) btn.classList.add('shift-active'); }
                        else if (key === 'BS') { btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L.37 12l5.04 8.12c.36.53.9.88 1.59.88h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" fill="currentColor"/></svg>`; btn.classList.add('ctrl-key'); }
                        else if (['ABC','123','#+='].includes(key)) { btn.classList.add('ctrl-key'); btn.textContent = key; }
                        else if (key === 'SPACE') { btn.style.flex = '5'; btn.textContent = 'space'; btn.classList.add('ctrl-key'); }
                        else if (key === 'RETURN') { btn.style.flex = '2'; btn.textContent = 'return'; btn.classList.add('ctrl-key'); }
                        else { btn.textContent = isShift && keyboardState === 'alpha' ? key.toUpperCase() : key; }
                        btn.onclick = (e) => { e.preventDefault(); handleKbdPress(key); };
                        div.appendChild(btn);
                    });
                    kbdContent.appendChild(div);
                });
            };

            const handleKbdPress = (key) => {
                if (key === 'SHIFT') { isShift = !isShift; renderKeyboard(); }
                else if (key === '123') { keyboardState = 'num'; isShift = false; renderKeyboard(); }
                else if (key === 'ABC') { keyboardState = 'alpha'; isShift = false; renderKeyboard(); }
                else if (key === '#+=') { keyboardState = 'sym'; renderKeyboard(); }
                else if (key === 'BS') { const t = typedDisplay.textContent; if (t.length > 0) typedDisplay.textContent = t.slice(0, -1); }
                else if (key === 'SPACE') typedDisplay.appendChild(document.createTextNode(' '));
                else if (key === 'RETURN') typedDisplay.appendChild(document.createTextNode('\n'));
                else { let char = isShift && keyboardState === 'alpha' ? key.toUpperCase() : key; typedDisplay.appendChild(document.createTextNode(char)); typedDisplay.scrollTop = typedDisplay.scrollHeight; if (isShift) { isShift = false; renderKeyboard(); } }
            };

            // SCIENTIFIC MATH LOGIC
            const handleScientific = (btn) => {
                let val = parseFloat(currentInput), res = val;
                const id = btn.id;
                const text = btn.textContent.trim().replace(/\s/g, ''); 
                
                const factorial = (n) => {
                    if (n < 0 || !Number.isInteger(n)) return NaN;
                    if (n === 0) return 1;
                    let r = 1; for(let i=2; i<=n; i++) r*=i; return r;
                };
                const toRad = (d) => d * Math.PI / 180;
                const fromRad = (r) => r * 180 / Math.PI;

                if (id === 'btn-2nd') {
                    is2nd = !is2nd;
                    document.getElementById('btn-ex').innerHTML = is2nd ? 'y<sup>x</sup>' : 'e<sup>x</sup>';
                    document.getElementById('btn-10x').innerHTML = is2nd ? '2<sup>x</sup>' : '10<sup>x</sup>';
                    document.getElementById('btn-ln').innerHTML = is2nd ? 'log<sub>y</sub>' : 'ln';
                    document.getElementById('btn-sin').innerHTML = is2nd ? 'sin⁻¹' : 'sin';
                    document.getElementById('btn-cos').innerHTML = is2nd ? 'cos⁻¹' : 'cos';
                    document.getElementById('btn-tan').innerHTML = is2nd ? 'tan⁻¹' : 'tan';
                    document.getElementById('btn-sinh').innerHTML = is2nd ? 'sinh⁻¹' : 'sinh';
                    document.getElementById('btn-cosh').innerHTML = is2nd ? 'cosh⁻¹' : 'cosh';
                    document.getElementById('btn-tanh').innerHTML = is2nd ? 'tanh⁻¹' : 'tanh';
                    btn.style.backgroundColor = is2nd ? '#FFFFFF' : 'var(--sci-dark-grey)';
                    btn.style.color = is2nd ? '#000000' : '#FFFFFF';
                    return;
                }

                if (text === '(') {
                    bracketStack.push({prev: previousInput, op: operator});
                    previousInput = ''; operator = null; currentInput = '0'; waitingForNewValue = true; return;
                }
                if (text === ')') {
                    calculate(); 
                    if (bracketStack.length > 0) {
                        let state = bracketStack.pop();
                        previousInput = state.prev; operator = state.op;
                        calculate(); 
                    }
                    return;
                }
                if (text === 'mc') { memoryValue = 0; waitingForNewValue = true; return; }
                if (text === 'm+') { memoryValue += val; waitingForNewValue = true; return; }
                if (text === 'm-') { memoryValue -= val; waitingForNewValue = true; return; }
                if (text === 'mr') { currentInput = memoryValue.toString(); waitingForNewValue = true; updateD(); return; }

                if (id === 'btn-rad') {
                    isDegrees = !isDegrees;
                    btn.innerHTML = isDegrees ? 'Rad' : 'Deg';
                    return;
                }

                if (text === 'x2') res = val ** 2;
                else if (text === 'x3') res = val ** 3;
                else if (text === 'xy') { operator = '^'; previousInput = currentInput; waitingForNewValue = true; return; }
                else if (id === 'btn-ex') {
                    if (is2nd) { operator = 'y^x'; previousInput = currentInput; waitingForNewValue = true; return; }
                    else res = Math.exp(val);
                }
                else if (id === 'btn-10x') res = is2nd ? 2 ** val : 10 ** val;
                else if (id === 'btn-1x') res = 1 / val;
                else if (text === '2√x') res = Math.sqrt(val);
                else if (text === '3√x') res = Math.cbrt(val);
                else if (text === 'y√x') { operator = 'yroot'; previousInput = currentInput; waitingForNewValue = true; return; }
                else if (id === 'btn-ln') { 
                    if (is2nd) { operator = 'logy'; previousInput = currentInput; waitingForNewValue = true; return; }
                    else res = Math.log(val);
                }
                else if (id === 'btn-log') res = Math.log10(val);
                else if (text === 'x!') res = factorial(val);
                else if (id === 'btn-sin') res = is2nd ? (isDegrees ? fromRad(Math.asin(val)) : Math.asin(val)) : Math.sin(isDegrees ? toRad(val) : val);
                else if (id === 'btn-cos') res = is2nd ? (isDegrees ? fromRad(Math.acos(val)) : Math.acos(val)) : Math.cos(isDegrees ? toRad(val) : val);
                else if (id === 'btn-tan') res = is2nd ? (isDegrees ? fromRad(Math.atan(val)) : Math.atan(val)) : Math.tan(isDegrees ? toRad(val) : val);
                else if (text === 'e') res = Math.E;
                else if (text === 'EE') { operator = 'EE'; previousInput = currentInput; waitingForNewValue = true; return; }
                else if (text === 'Rand') res = Math.random();
                else if (id === 'btn-sinh') res = is2nd ? Math.asinh(val) : Math.sinh(val);
                else if (id === 'btn-cosh') res = is2nd ? Math.acosh(val) : Math.cosh(val);
                else if (id === 'btn-tanh') res = is2nd ? Math.atanh(val) : Math.tanh(val);
                else if (text === 'π') res = Math.PI;

                currentInput = (Math.round(res * 1e10) / 1e10).toString();
                waitingForNewValue = true;
                updateD();
            };

            const calculate = () => {
                if (!operator || !previousInput) return;
                let prev = parseFloat(previousInput), cur = parseFloat(currentInput), res = 0;
                switch (operator) {
                    case '+': res = prev + cur; break;
                    case '-': res = prev - cur; break;
                    case '×': res = prev * cur; break;
                    case '÷': res = cur === 0 ? 'Error' : prev / cur; break;
                    case '^': case 'y^x': res = prev ** cur; break;
                    case 'yroot': res = prev ** (1/cur); break;
                    case 'logy': res = Math.log(prev) / Math.log(cur); break;
                    case 'EE': res = prev * (10 ** cur); break;
                }
                if (res !== 'Error') res = Math.round(res * 1e10) / 1e10; 
                currentInput = res.toString(); operator = null; previousInput = ''; waitingForNewValue = true; updateD();
            };

            document.querySelectorAll('.calc-btn').forEach(btn => {
                btn.onclick = () => {
                    const label = btn.getAttribute('aria-label');
                    const textNode = btn.childNodes[0];
                    const text = textNode ? textNode.textContent.trim() : "";
                    if (btn.classList.contains('kbd-btn')) return;

                    // CAMERA INTERCEPT
                    if (isKeyboardMode) {
                        if (text === '0') { if (!isCameraOn) startCamera(); else if (!isPhotoTaken) capturePhoto(); return; }
                        if (text === '.') { if (isCameraOn) stopCameraSystem(); return; }
                        if (text === '+') { if (isPhotoTaken) { const b64 = photoPreview.src.split(',')[1]; callDeepSeek(b64); } else callDeepSeek(); return; }
                        if (text === '-') { if (isPhotoTaken) retakePhoto(); return; }
                        if (isCameraOn && !isPhotoTaken) return; 
                    }

                    if (isKeyboardMode || isLogMode) {
                        if (label === 'Backspace') { const t = typedDisplay.textContent; if (t.length > 0) typedDisplay.textContent = t.slice(0, -1); }
                        else if (text === 'AC') { typedDisplay.textContent = ''; }
                        else if (text === '=') typedDisplay.appendChild(document.createTextNode('\n'));
                        else if (text === '%') typedDisplay.textContent = '';
                        else if (text === '÷') settingsPanel.style.display = 'flex';
                        else if (/[0-9]/.test(text)) typedDisplay.appendChild(document.createTextNode(text));
                        return;
                    }

                    // STANDARD CALC ROUTING
                    if (btn.classList.contains('sci-btn')) { handleScientific(btn); return; }
                    
                    if (label === 'Backspace') { if (!waitingForNewValue) currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0'; updateD(); }
                    else if (label === 'Plus Minus') { currentInput = (parseFloat(currentInput) * -1).toString(); updateD(); }
                    else if (text === 'AC') { 
                        currentInput = '0'; previousInput = ''; operator = null; waitingForNewValue = false; 
                        typedDisplay.textContent = ''; // Also acts as a hard reset for AI notes
                        bracketStack = [];
                        updateD(); 
                    }
                    else if (text === '%') { currentInput = (parseFloat(currentInput) / 100).toString(); updateD(); }
                    else if (text === '.') { if (!currentInput.includes('.')) currentInput += '.'; updateD(); }
                    else if (['+', '-', '×', '÷'].includes(text)) { if (operator && !waitingForNewValue) calculate(); previousInput = currentInput; operator = text; waitingForNewValue = true; }
                    else if (text === '=') calculate();
                    else if (/[0-9]/.test(text)) { currentInput = (waitingForNewValue || currentInput === '0') ? text : currentInput + text; waitingForNewValue = false; updateD(); }
                };
            });

            /* --- SETTINGS PERSISTENCE --- */
            document.getElementById('input-cam-ratio').onchange = (e) => { prefs.camRatio = e.target.value; applyPrefs(); localStorage.setItem('camRatio', prefs.camRatio); };
            document.getElementById('input-cam-zoom').onchange = (e) => { prefs.camZoom = e.target.value; applyPrefs(); localStorage.setItem('camZoom', prefs.camZoom); };
            document.getElementById('input-cam-fit').onchange = (e) => { prefs.camFit = e.target.value; applyPrefs(); localStorage.setItem('camFit', prefs.camFit); };

            document.getElementById('input-text-opacity').oninput = (e) => { prefs.textOpacity = e.target.value; applyPrefs(); localStorage.setItem('textOpacity', prefs.textOpacity); };
            document.getElementById('input-kbd-opacity').oninput = (e) => { prefs.kbdOpacity = e.target.value; applyPrefs(); localStorage.setItem('kbdOpacity', prefs.kbdOpacity); };
            document.getElementById('input-cam-opacity').oninput = (e) => { prefs.camOpacity = e.target.value; applyPrefs(); localStorage.setItem('camOpacity', prefs.camOpacity); };
            document.getElementById('input-pic-opacity').oninput = (e) => { prefs.picOpacity = e.target.value; applyPrefs(); localStorage.setItem('picOpacity', prefs.picOpacity); };
            document.getElementById('input-log-opacity').oninput = (e) => { prefs.logOpacity = e.target.value; applyPrefs(); localStorage.setItem('logOpacity', prefs.logOpacity); };
            document.getElementById('input-overlay-toggle').onchange = (e) => { prefs.overlay = e.target.checked; applyPrefs(); localStorage.setItem('overlay', prefs.overlay); };
            document.getElementById('input-glass-toggle').onchange = (e) => { prefs.glassMode = e.target.checked; applyPrefs(); localStorage.setItem('glassMode', prefs.glassMode); };
            document.getElementById('input-api-key').oninput = (e) => { prefs.apiKey = e.target.value; localStorage.setItem('deepseekKey', prefs.apiKey); };
            document.getElementById('input-model-mode').onchange = (e) => { prefs.model = e.target.value; localStorage.setItem('deepseekModel', prefs.model); };
            
            document.getElementById('prompt-thinking').oninput = (e) => { prefs.thinkingPrompt = e.target.value; localStorage.setItem('promptThinking', prefs.thinkingPrompt); };
            document.getElementById('prompt-reasoning').oninput = (e) => { prefs.reasoningPrompt = e.target.value; localStorage.setItem('promptReasoning', prefs.reasoningPrompt); };
            document.getElementById('prompt-camera').oninput = (e) => { prefs.cameraPrompt = e.target.value; localStorage.setItem('promptCamera', prefs.cameraPrompt); };

            document.getElementById('close-settings-btn').onclick = () => settingsPanel.style.display = 'none';

            applyPrefs();
            updateD();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <!-- iOS SAFARI STANDALONE OPTIMIZATION -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    <meta name="theme-color" content="#000000">
    <title>Calculator</title>

    <!-- LATEX ENGINE (KaTeX) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            /* iOS Calculator Colors */
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --sci-dark-grey: #1A1A1A;
            --action-grey: #525252;
            --number-grey: #2B2B2B;
            --operator-orange: #FF9300;

            /* Reference dimensions for iPhone 13 (1170x2532) */
            --ref-w: 1170;
            --ref-h: 2532;

            /* Base App Dimensions for Scaling (Bypasses Safari container-type bug) */
            --app-w: min(100vw, 450px);
            --app-h: min(100vh, 974px);

            /* Aspect-ratio based spacing/sizes using app width/height */
            --gap-btn: calc((24 / var(--ref-w)) * var(--app-w)); 
            --pad-top: 0;
            --pad-side: calc((50 / var(--ref-w)) * var(--app-w));
            --header-btn-size: calc((120 / var(--ref-w)) * var(--app-w));
            --pad-bottom: calc((186 / var(--ref-h)) * var(--app-h));
            --btn-height: calc((144 / var(--ref-h)) * var(--app-h));
            --btn-lower-w: calc((250 / var(--ref-w)) * var(--app-w));
            --btn-upper-w: calc((160 / var(--ref-w)) * var(--app-w));
            
            /* Text sizes scaled by width ratio */
            --font-screen: calc((154 / var(--ref-w)) * var(--app-w));
            --font-num: calc((52 / var(--ref-w)) * var(--app-w)); 
            --font-action: calc((62 / var(--ref-w)) * var(--app-w));
            --font-upper: calc((37 / var(--ref-w)) * var(--app-w)); 
            --font-pm: calc((81 / var(--ref-w)) * var(--app-w));

            /* Dynamic Opacity Vars */
            --kbd-opacity: 0.10;
            --text-opacity: 0.20;
            --log-opacity: 0.10;
            --cam-opacity: 0.10;
            --pic-opacity: 0.15;
        }

        /* --- SLEEK MODERN SCROLLBARS --- */
        ::-webkit-scrollbar {
            width: 3px; height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        html, body {
            margin: 0; padding: 0;
            background-color: #000000; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            color: var(--text-color);
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; user-select: none; -webkit-user-select: none;
            touch-action: none;
        }

        #calculator-app {
            width: 100%; height: 100%;
            max-width: 450px; max-height: 974px; 
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            box-sizing: border-box;
            padding-bottom: var(--pad-bottom); 
            position: relative;
            overflow: hidden;
        }

        /* --- VISUAL OVERLAYS --- */
        #camera-view, #photo-preview {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; display: none; z-index: 50; pointer-events: none;
        }
        #camera-view.active { display: block; opacity: var(--cam-opacity); }
        #photo-preview.active { display: block; opacity: var(--pic-opacity); }

        #camera-indicator {
            position: absolute; top: 50px; left: 50%;
            transform: translateX(-50%); font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; opacity: 0; color: var(--operator-orange);
            z-index: 100; transition: opacity 0.3s;
        }
        #camera-indicator.visible { opacity: 0.8; }

        #api-status { 
            position: absolute; top: 85px; left: 50%; 
            transform: translateX(-50%); font-size: 10px; opacity: 0.8; 
            letter-spacing: 1.2px; display: none; color: var(--operator-orange); 
            font-weight: bold; width: 80%; text-align: center; pointer-events: none; z-index: 100; 
        }

        /* --- OVERLAY PANELS --- */
        @keyframes modalSlideUp {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .overlay-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.65); z-index: 1000;
            backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%);
            display: none; flex-direction: column; padding: 10% 6%;
            box-sizing: border-box; overflow-y: auto; -webkit-overflow-scrolling: touch;
            animation: modalSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            touch-action: pan-y;
            scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }
        .settings-header { 
            font-size: 28px; font-weight: 800; margin-bottom: 25px; text-align: center; 
            background: linear-gradient(135deg, #ffffff, #aaaaaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .setting-item { 
            margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; 
            background: rgba(45, 45, 45, 0.4); padding: 16px; 
            border-radius: 18px; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 8px 20px rgba(0,0,0,0.2);
        }
        .setting-item label { 
            font-size: 11px; font-weight: 700; opacity: 0.6; text-transform: uppercase; 
            letter-spacing: 1px; color: #fff; margin-bottom: 4px;
        }
        .setting-item input[type="text"], .setting-item input[type="password"], .setting-item select, .setting-item textarea {
            width: 100%; background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.05); 
            color: white; padding: 12px 14px; border-radius: 12px; font-size: 14px; outline: none; 
            transition: all 0.3s ease; box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); box-sizing: border-box;
        }
        .setting-item input:focus, .setting-item select:focus, .setting-item textarea:focus {
            border-color: rgba(255, 147, 0, 0.6); box-shadow: inset 0 2px 5px rgba(0,0,0,0.3), 0 0 0 3px rgba(255, 147, 0, 0.15); background: rgba(0,0,0,0.4);
        }
        .setting-item textarea { height: 80px; resize: none; font-family: inherit; font-size: 13px; line-height: 1.4; }
        .setting-item textarea::-webkit-scrollbar { width: 14px; }
        .setting-item textarea::-webkit-scrollbar-track { background: transparent; margin: 6px 0; }
        .setting-item textarea::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.25); border-radius: 10px; border: 4px solid transparent; background-clip: padding-box; }
        .setting-item textarea::-webkit-scrollbar-thumb:hover { background-color: rgba(255, 255, 255, 0.4); }
        .setting-item.row { flex-direction: row; justify-content: space-between; align-items: center; }
        
        input[type="checkbox"] {
            -webkit-appearance: none; appearance: none;
            width: 50px; height: 30px; background: rgba(255,255,255,0.15);
            border-radius: 30px; position: relative; cursor: pointer; outline: none; transition: background 0.3s;
            margin: 0; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        input[type="checkbox"]::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px;
            background: white; border-radius: 50%; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        input[type="checkbox"]:checked { background: var(--operator-orange); }
        input[type="checkbox"]:checked::after { transform: translateX(20px); }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255, 255, 255, 0.15); border-radius: 5px; outline: none; margin: 10px 0; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);}
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }

        .close-btn { margin-top: 10px; background: linear-gradient(135deg, var(--operator-orange), #E68400); border: none; color: white; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; flex-shrink: 0; box-shadow: 0 8px 20px rgba(255, 147, 0, 0.25); transition: transform 0.2s, box-shadow 0.2s; }
        .close-btn:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(255, 147, 0, 0.2); }

        /* History Log View */
        #log-pad {
            position: absolute; top: 0; left: 0; width: 100%; 
            height: calc((var(--btn-height) * 5) + (var(--gap-btn) * 4)); 
            display: none; flex-direction: column; z-index: 6;
            padding: 0 var(--pad-side); box-sizing: border-box;
            overflow-y: auto; opacity: var(--log-opacity);
            touch-action: pan-y; scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }
        #log-pad.active { display: flex; }
        .log-entry { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .log-prompt { color: var(--operator-orange); font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .log-response { color: white; font-size: 13px; line-height: 1.4; white-space: pre-wrap; }

        /* Header / Nav UI */
        .header { display: flex; justify-content: space-between; align-items: center; padding-top: 50px; padding-left: var(--pad-side); padding-right: var(--pad-side); width: 100%; box-sizing: border-box; z-index: 10; }
        .header-btn { width: var(--header-btn-size); height: var(--header-btn-size); background-color: var(--sci-dark-grey); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; cursor: pointer; color: #FFFFFF; }
        .header-btn svg { width: 50%; height: 50%; stroke: currentColor; fill: none; stroke-width: 1.5; }

        /* Output Displays */
        .display-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 0 var(--pad-side) calc(var(--app-h) * 0.02) var(--pad-side); overflow: hidden; z-index: 10; touch-action: pan-y; }
        
        .typed-text-display { 
            width: 100%; color: rgba(255, 255, 255, var(--text-opacity)); 
            font-size: calc(var(--font-screen) * 0.22); 
            /* Increased line height to accommodate LaTeX without clipping */
            line-height: 1.5; 
            text-align: right; 
            max-height: 5.5em; /* Slightly taller for fractions */
            overflow-y: auto; overflow-x: hidden; word-break: break-word; white-space: pre-wrap; 
            margin-bottom: 8px; outline: none; user-select: text; -webkit-user-select: text; caret-color: transparent; 
            touch-action: pan-y; scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
            /* Added padding to prevent tall math from clipping top/bottom */
            padding: 8px 0;
        }
        .typed-text-display:focus { caret-color: #FFFFFF; } 
        .screen { font-size: var(--font-screen); font-weight: 300; line-height: 1; margin: 0; letter-spacing: 0.5px; color: #FFFFFF; transition: font-size 0.2s ease-out; }

        /* Keypads */
        .keypad { display: flex; flex-direction: column; gap: var(--gap-btn); margin-top: auto; position: relative; z-index: 10; }
        
        .calc-btn { 
            border: none; outline: none; cursor: pointer; color: #FFFFFF; 
            border-radius: 100px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            height: var(--btn-height); position: relative; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            touch-action: manipulation;
        }
        .calc-btn:active { transform: scale(0.85); filter: brightness(1.4); }
        .calc-btn svg { width: 45%; height: 45%; stroke: currentColor; fill: none; stroke-width: 1.5; }
        .helper-text { position: absolute; bottom: 10%; font-size: 9px; text-transform: lowercase; opacity: 0.25; display: none; }

        .scientific-grid { display: grid; grid-template-columns: repeat(6, var(--btn-upper-w)); justify-content: center; gap: var(--gap-btn); transition: opacity 0.3s; }
        .sci-btn { background-color: var(--sci-dark-grey); width: var(--btn-upper-w); font-size: var(--font-upper); white-space: nowrap; }
        .sci-btn sup, .sci-btn sub { font-size: 0.6em; pointer-events: none; }
        .stacked-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 0.9; }
        .stacked-btn span:first-child { font-size: 1em; transform: translateY(2px); }
        .stacked-btn span:last-child { font-size: 0.65em; transform: translateY(-2px); }

        .basic-grid { display: grid; grid-template-columns: repeat(4, var(--btn-lower-w)); justify-content: center; gap: var(--gap-btn); }
        .btn-action { background-color: var(--action-grey); font-size: var(--font-action); }
        .btn-number { background-color: var(--number-grey); font-size: var(--font-num); }
        .btn-operator { background-color: var(--operator-orange); font-size: var(--font-action); }

        /* --- LIQUID GLASS MODE --- */
        .liquid-glass-mode .calc-btn, .liquid-glass-mode .header-btn, .liquid-glass-mode .overlay-panel {
            background-color: rgba(30, 30, 30, 0.4) !important;
            backdrop-filter: blur(25px) saturate(200%); -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15); color: #FFFFFF !important;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .liquid-glass-mode .btn-operator { background-color: rgba(255, 147, 0, 0.4) !important; border-color: rgba(255, 147, 0, 0.5) !important; }
        .liquid-glass-mode .btn-action { background-color: rgba(255, 255, 255, 0.2) !important; }
        .liquid-glass-mode .kbd-btn.shift-active { background-color: rgba(255, 255, 255, 0.5) !important; }
        .liquid-glass-mode .kbd-btn { background-color: rgba(30, 30, 30, 0.4) !important; }

        /* --- MODE OVERRIDES --- */
        .camera-essential { z-index: 60 !important; }
        .keyboard-hidden { opacity: 0 !important; pointer-events: none !important; }

        .keyboard-grid { position: absolute; top: 0; left: 0; width: 100%; display: none; flex-direction: column; gap: var(--gap-btn); opacity: var(--kbd-opacity); padding-left: var(--pad-side); padding-right: var(--pad-side); box-sizing: border-box; height: calc((var(--btn-height) * 5) + (var(--gap-btn) * 4)); justify-content: center; z-index: 5; pointer-events: none; }
        .keyboard-grid.active { display: flex; pointer-events: auto; }
        .kbd-row { display: flex; justify-content: center; gap: calc(var(--gap-btn) * 0.35); height: calc(var(--btn-height) * 0.85); }
        .kbd-btn { background-color: var(--sci-dark-grey); border-radius: calc(var(--btn-height) * 0.2); flex: 1; font-size: calc(var(--font-upper) * 1.25); font-weight: 400; color: #FFF; pointer-events: auto; }
        .kbd-btn.shift-active { background-color: #FFFFFF; color: #000000; }
        
    </style>
</head>
<body>
    <div id="calculator-app">
        <video id="camera-view" autoplay playsinline></video>
        <img id="photo-preview" src="">
        
        <div id="camera-indicator">camera mode</div>
        <div id="api-status">THINKING...</div>

        <!-- SETTINGS PANEL -->
        <div id="settings-panel" class="overlay-panel">
            <div class="settings-header">Preferences</div>
            <div class="setting-item">
                <label>Gemini API Key (For Image Extraction)</label>
                <input type="password" id="input-gemini-key" placeholder="Paste your Gemini key here">
            </div>
            <div class="setting-item">
                <label>DeepSeek API Key (For Math/Text)</label>
                <input type="password" id="input-api-key" placeholder="Paste your DeepSeek key here">
            </div>
            <div class="setting-item row">
                <label>Auto-Send Image Text to DeepSeek</label>
                <input type="checkbox" id="input-autodeepseek-toggle">
            </div>
            <div class="setting-item row">
                <label>AI Context Memory (Send Log)</label>
                <input type="checkbox" id="input-memory-toggle">
            </div>
            <div class="setting-item">
                <label>Model Mode (DeepSeek)</label>
                <select id="input-model-mode">
                    <option value="deepseek-reasoner">Reasoning (Reasoner)</option>
                    <option value="deepseek-chat">Thinking (Chat)</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label>Thinking Instructions (DeepSeek Chat)</label>
                <textarea id="prompt-thinking" placeholder="Instructions..."></textarea>
            </div>
            <div class="setting-item">
                <label>Reasoning Instructions (DeepSeek Reasoner)</label>
                <textarea id="prompt-reasoning" placeholder="Instructions..."></textarea>
            </div>
            <div class="setting-item">
                <label>Gemini Extraction Prompt (Vision -> Text)</label>
                <textarea id="prompt-gemini" placeholder="Instructions..."></textarea>
            </div>
            <div class="setting-item">
                <label>Camera Direct Solve Prompt (Vision Only)</label>
                <textarea id="prompt-camera" placeholder="Instructions..."></textarea>
            </div>
            
            <div class="setting-item" id="setting-item-ratio">
                <label>Camera Aspect Ratio</label>
                <select id="input-cam-ratio">
                    <option value="4:3">4:3 (Standard Photo)</option>
                    <option value="16:9">16:9 (Widescreen)</option>
                </select>
            </div>
            <div class="setting-item" id="setting-item-zoom">
                <label>Camera Hardware Zoom</label>
                <select id="input-cam-zoom">
                    <option value="0.5">0.5x (Ultra-wide)</option>
                    <option value="1">1x (Standard)</option>
                    <option value="2">2x (Telephoto)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Camera View Fit</label>
                <select id="input-cam-fit">
                    <option value="cover">Fill Screen</option>
                    <option value="contain">Fit to Screen</option>
                </select>
            </div>
            <div class="setting-item">
                <label>AI Temperature: <span id="label-ai-temp">0.2</span></label>
                <input type="range" id="input-ai-temp" min="0" max="2" step="0.1" value="0.2">
            </div>
            <div class="setting-item">
                <label>Text Above Opacity: <span id="label-text-opacity">20</span>%</label>
                <input type="range" id="input-text-opacity" min="0" max="100" value="20">
            </div>
            <div class="setting-item">
                <label>Keyboard Opacity: <span id="label-kbd-opacity">10</span>%</label>
                <input type="range" id="input-kbd-opacity" min="0" max="100" value="10">
            </div>
            <div class="setting-item">
                <label>Camera Opacity: <span id="label-cam-opacity">10</span>%</label>
                <input type="range" id="input-cam-opacity" min="0" max="100" value="10">
            </div>
            <div class="setting-item">
                <label>Picture Opacity: <span id="label-pic-opacity">15</span>%</label>
                <input type="range" id="input-pic-opacity" min="0" max="100" value="15">
            </div>
            <div class="setting-item">
                <label>History Log Opacity: <span id="label-log-opacity">10</span>%</label>
                <input type="range" id="input-log-opacity" min="0" max="100" value="10">
            </div>
            <div class="setting-item row">
                <label>Overlay Active</label>
                <input type="checkbox" id="input-overlay-toggle">
            </div>
            <div class="setting-item row">
                <label>Liquid Glass Mode</label>
                <input type="checkbox" id="input-glass-toggle">
            </div>
            <div class="setting-item row">
                <label>Auto-Glass in Camera</label>
                <input type="checkbox" id="input-auto-glass-toggle">
            </div>
            <button class="close-btn" id="clear-log-btn" style="background: var(--action-grey); box-shadow: none; margin-top: 20px;">Clear History Log</button>
            <button class="close-btn" id="close-settings-btn">Done</button>
        </div>

        <!-- HEADER UI -->
        <div class="header">
            <button class="header-btn" id="toggle-log-btn" aria-label="History Log">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><polyline points="12 7 12 12 15 14"></polyline></svg>
            </button>
            <button class="header-btn" id="toggle-keyboard-btn" aria-label="Math Notes">
                <svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2" ref="2"></rect><line x1="8" y1="8" x2="16" y2="8"></line><circle cx="8" cy="13" r="1" fill="currentColor"></circle><circle cx="12" cy="13" r="1" fill="currentColor"></circle><circle cx="16" cy="13" r="1" fill="currentColor"></circle><circle cx="8" cy="17" r="1" fill="currentColor"></circle><circle cx="12" cy="17" r="1" fill="currentColor"></circle><circle cx="16" cy="17" r="1" fill="currentColor"></circle></svg>
            </button>
        </div>

        <!-- DYNAMIC DISPLAYS -->
        <div class="display-container">
            <div class="typed-text-display" id="typed-display" contenteditable="true" spellcheck="false"></div>
            <div class="screen" id="display">0</div>
        </div>

        <!-- KEYPADS -->
        <div class="keypad">
            <div class="scientific-grid" id="scientific-pad">
                <button class="calc-btn sci-btn">(</button>
                <button class="calc-btn sci-btn">)</button>
                <button class="calc-btn sci-btn">mc</button>
                <button class="calc-btn sci-btn">m+</button>
                <button class="calc-btn sci-btn">m-</button>
                <button class="calc-btn sci-btn">mr</button>
                <button class="calc-btn sci-btn stacked-btn" id="btn-2nd"><span>2</span><span>nd</span></button>
                <button class="calc-btn sci-btn">x<sup>2</sup></button>
                <button class="calc-btn sci-btn">x<sup>3</sup></button>
                <button class="calc-btn sci-btn">x<sup>y</sup></button>
                <button class="calc-btn sci-btn" id="btn-ex">e<sup>x</sup></button>
                <button class="calc-btn sci-btn" id="btn-10x">10<sup>x</sup></button>
                <button class="calc-btn sci-btn" id="btn-1x"><sup>1</sup><span style="font-size:1.2em; font-weight:300; margin: 0 -2px;">/</span><sub>x</sub></button>
                <button class="calc-btn sci-btn"><sup>2</sup>√x</button>
                <button class="calc-btn sci-btn"><sup>3</sup>√x</button>
                <button class="calc-btn sci-btn"><sup>y</sup>√x</button>
                <button class="calc-btn sci-btn" id="btn-ln">ln</button>
                <button class="calc-btn sci-btn" id="btn-log">log<sub>10</sub></button>
                <button class="calc-btn sci-btn">x!</button>
                <button class="calc-btn sci-btn" id="btn-sin">sin</button>
                <button class="calc-btn sci-btn" id="btn-cos">cos</button>
                <button class="calc-btn sci-btn" id="btn-tan">tan</button>
                <button class="calc-btn sci-btn">e</button>
                <button class="calc-btn sci-btn">EE</button>
                <button class="calc-btn sci-btn">Rand</button>
                <button class="calc-btn sci-btn" id="btn-sinh">sinh</button>
                <button class="calc-btn sci-btn" id="btn-cosh">cosh</button>
                <button class="calc-btn sci-btn" id="btn-tanh">tanh</button>

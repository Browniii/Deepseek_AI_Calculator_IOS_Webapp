            <div id="log-pad"></div>
            <div class="keyboard-grid" id="keyboard-grid">
                <div id="kbd-layout-content" style="display:contents"></div>
            </div>
            
            <div class="basic-grid">
                <button class="calc-btn basic-btn btn-action" aria-label="Backspace"><svg viewBox="0 0 24 24"><path d="M 8 6 H 19 C 20.1 6 21 6.9 21 8 V 16 C 21 17.1 20.1 18 19 18 H 8 L 3 12 Z" stroke-linejoin="round"></path><line x1="11" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="11" y2="15"></line></svg></button>
                <button class="calc-btn basic-btn btn-action" id="btn-ac">AC<span class="helper-text">clear</span></button>
                <button class="calc-btn basic-btn btn-action">%</button>
                <button class="calc-btn basic-btn btn-operator" id="btn-settings-trigger">÷<span class="helper-text">settings</span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-7">7</button><button class="calc-btn basic-btn btn-number" id="btn-8">8</button><button class="calc-btn basic-btn btn-number" id="btn-9">9</button><button class="calc-btn basic-btn btn-operator">×</button>
                <button class="calc-btn basic-btn btn-number" id="btn-4">4</button><button class="calc-btn basic-btn btn-number" id="btn-5">5</button><button class="calc-btn basic-btn btn-number" id="btn-6">6</button>
                <button class="calc-btn basic-btn btn-operator" id="btn-minus">-<span class="helper-text" id="helper-minus"></span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-1">1</button><button class="calc-btn basic-btn btn-number" id="btn-2">2</button><button class="calc-btn basic-btn btn-number" id="btn-3">3</button>
                <button class="calc-btn basic-btn btn-operator" id="btn-plus">+<span class="helper-text" id="helper-plus">send</span></button>
                <button class="calc-btn basic-btn btn-number btn-plus-minus" id="btn-pm" aria-label="Plus Minus"><svg viewBox="0 0 40 40"><path d="M 10 14 L 18 14 M 14 10 L 14 18" stroke-width="2.5" stroke-linecap="round"/><line x1="13" y1="28" x2="27" y2="12" stroke-width="2.5" stroke-linecap="round"/><line x1="22" y1="26" x2="30" y2="26" stroke-width="2.5" stroke-linecap="round"/></svg><span class="helper-text" id="helper-pm"></span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-0">0<span class="helper-text" id="helper-0"></span></button>
                <button class="calc-btn basic-btn btn-number" id="btn-dot">.<span class="helper-text" id="helper-dot"></span></button>
                <button class="calc-btn basic-btn btn-operator" id="btn-equals">=<span class="helper-text">return</span></button>
            </div>
        </div>
    </div>

    <!-- MAIN APPLICATION SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /* --- ELEMENT DEFINITIONS --- */
            const video = document.getElementById('camera-view');
            const photoPreview = document.getElementById('photo-preview');
            const indicator = document.getElementById('camera-indicator');
            const display = document.getElementById('display');
            const typedDisplay = document.getElementById('typed-display');
            const toggleKeyboardBtn = document.getElementById('toggle-keyboard-btn');
            const toggleLogBtn = document.getElementById('toggle-log-btn');
            const sciPad = document.getElementById('scientific-pad');
            const kbdGrid = document.getElementById('keyboard-grid');
            const logPad = document.getElementById('log-pad');
            const kbdContent = document.getElementById('kbd-layout-content');
            const helpers = document.querySelectorAll('.helper-text');
            const settingsPanel = document.getElementById('settings-panel');
            const apiStatus = document.getElementById('api-status');
            const appWrapper = document.getElementById('calculator-app');
            const root = document.documentElement;

            // Check hardware support for Camera adjustments
            if (navigator.mediaDevices && navigator.mediaDevices.getSupportedConstraints) {
                const constraints = navigator.mediaDevices.getSupportedConstraints();
                if (!constraints.aspectRatio) {
                    const el = document.getElementById('setting-item-ratio');
                    if (el) el.style.display = 'none';
                }
                if (!constraints.zoom) {
                    const el = document.getElementById('setting-item-zoom');
                    if (el) el.style.display = 'none';
                }
            }

            /* --- GLOBAL APP STATE --- */
            let history = JSON.parse(localStorage.getItem('aiHistory')) || [];
            let currentInput = '0', previousInput = '', operator = null, waitingForNewValue = false;
            let isKeyboardMode = false, isLogMode = false, isShift = false, keyboardState = 'alpha';
            let isCameraOn = false, isPhotoTaken = false, stream = null;
            let justReceivedAiResponse = false;
            
            // Scientific State
            let memoryValue = 0;
            let isDegrees = true;
            let is2nd = false;
            let bracketStack = [];

            /* --- USER PREFERENCES --- */
            const prefs = {
                textOpacity: localStorage.getItem('textOpacity') || 20,
                kbdOpacity: localStorage.getItem('kbdOpacity') || 10,
                logOpacity: localStorage.getItem('logOpacity') || 10,
                camOpacity: localStorage.getItem('camOpacity') || 10,
                picOpacity: localStorage.getItem('picOpacity') || 15,
                overlay: localStorage.getItem('overlay') === null ? true : localStorage.getItem('overlay') === 'true',
                glassMode: localStorage.getItem('glassMode') === 'true' || false,
                autoGlass: localStorage.getItem('autoGlass') === 'true' || false,
                memoryMode: localStorage.getItem('memoryMode') === 'true' || false,
                aiTemp: localStorage.getItem('aiTemp') !== null ? parseFloat(localStorage.getItem('aiTemp')) : 0.2,
                geminiKey: localStorage.getItem('geminiKey') || "",
                apiKey: localStorage.getItem('deepseekKey') || "",
                autoDeepSeek: localStorage.getItem('autoDeepSeek') === null ? true : localStorage.getItem('autoDeepSeek') === 'true',
                model: localStorage.getItem('deepseekModel') || "deepseek-reasoner",
                
                // Prompts carefully constructed for pure text output and LaTeX support
                thinkingPrompt: localStorage.getItem('promptThinking') || "Analyze the query and provide the most correct and concise answer. If it contains math, solve using Python logic. Think deeply about the answer. Provide a short but most correct and concise answer, then explain why later. Latex is supported. Use it for all mathematical notation using $...$ for inline or $$...$$ for display. Output pure text only. Do not use any text flairs like bold, italics, or markdown formatting.",
                reasoningPrompt: localStorage.getItem('promptReasoning') || "Analyze this input and provide a concise and most correct answer for each question. If it contains math, solve using Python logic. Think deeply about the answer. To answer, first provide the question number (if applicable), then ABCD if multiple choice, or a short, correct, concise answer for written questions. Repeat for all questions, then explain why later. Latex is supported. Use it for all mathematical notation using $...$ for inline or $$...$$ for display. Output pure text only. Do not use any text flairs like bold, italics, or markdown formatting.",
                geminiPrompt: localStorage.getItem('promptGemini') || "Extract all text from this image into pure text as questions. Ignore layout elements, just extract the actual text content perfectly. If there are graphs, charts, diagrams, or specific colors that are relevant to the question, describe them accurately and extract any data points, labels, or visual relationships so the problem can be solved. Be comprehensive for all types of visual questions. Latex is supported. Use it for all mathematical notation using $...$ for inline or $$...$$ for display. Output pure text only. Do not use any text flairs like bold, italics, or markdown formatting.",
                cameraPrompt: localStorage.getItem('promptCamera') || "Analyze this image and provide a concise and most correct answer for each question in the image. If it contains math, solve using Python logic. If it is hard to read important text, such as being cut off or too blurry, ask the user to retake the image. Think deeply about the answer. To answer, first provide question number if applicable, then ABCD if multiple choice, for short but most correct and concise answer for written answer, repeat for all questions- then explain why later. Latex is supported. Use it for all mathematical notation using $...$ for inline or $$...$$ for display. Output pure text only. Do not use any text flairs like bold, italics, or markdown formatting.",
                
                camRatio: localStorage.getItem('camRatio') || "4:3",
                camZoom: localStorage.getItem('camZoom') || "0.5",
                camFit: localStorage.getItem('camFit') || "cover"
            };

            /* --- UI ENGINE --- */
            const updateD = () => { 
                let s = currentInput; 
                if (s.length > 15 && !s.includes('e')) s = s.substring(0, 15); 
                display.textContent = s; 
                
                if (s.length > 9) {
                    display.style.fontSize = `calc(var(--font-screen) * ${9 / s.length})`;
                } else {
                    display.style.fontSize = 'var(--font-screen)';
                }
            };

            const applyPrefs = () => {
                root.style.setProperty('--text-opacity', prefs.textOpacity / 100);
                root.style.setProperty('--kbd-opacity', prefs.kbdOpacity / 100);
                root.style.setProperty('--log-opacity', prefs.logOpacity / 100);
                root.style.setProperty('--cam-opacity', prefs.camOpacity / 100);
                root.style.setProperty('--pic-opacity', prefs.picOpacity / 100);
                
                document.getElementById('input-text-opacity').value = prefs.textOpacity;
                document.getElementById('label-text-opacity').textContent = prefs.textOpacity;
                document.getElementById('input-kbd-opacity').value = prefs.kbdOpacity;
                document.getElementById('label-kbd-opacity').textContent = prefs.kbdOpacity;
                document.getElementById('input-cam-opacity').value = prefs.camOpacity;
                document.getElementById('label-cam-opacity').textContent = prefs.camOpacity;
                document.getElementById('input-pic-opacity').value = prefs.picOpacity;
                document.getElementById('label-pic-opacity').textContent = prefs.picOpacity;
                document.getElementById('input-log-opacity').value = prefs.logOpacity;
                document.getElementById('label-log-opacity').textContent = prefs.logOpacity;
                
                document.getElementById('input-ai-temp').value = prefs.aiTemp;
                document.getElementById('label-ai-temp').textContent = prefs.aiTemp.toFixed(1);

                document.getElementById('input-overlay-toggle').checked = prefs.overlay;
                document.getElementById('input-glass-toggle').checked = prefs.glassMode;
                document.getElementById('input-auto-glass-toggle').checked = prefs.autoGlass;
                document.getElementById('input-autodeepseek-toggle').checked = prefs.autoDeepSeek;
                document.getElementById('input-memory-toggle').checked = prefs.memoryMode;
                
                document.getElementById('input-gemini-key').value = prefs.geminiKey;
                document.getElementById('input-api-key').value = prefs.apiKey;
                document.getElementById('input-model-mode').value = prefs.model;
                
                document.getElementById('prompt-thinking').value = prefs.thinkingPrompt;
                document.getElementById('prompt-reasoning').value = prefs.reasoningPrompt;
                document.getElementById('prompt-gemini').value = prefs.geminiPrompt;
                document.getElementById('prompt-camera').value = prefs.cameraPrompt;

                document.getElementById('input-cam-ratio').value = prefs.camRatio;
                document.getElementById('input-cam-zoom').value = prefs.camZoom;
                document.getElementById('input-cam-fit').value = prefs.camFit;
                
                video.style.objectFit = prefs.camFit;
                photoPreview.style.objectFit = prefs.camFit;
                
                const backgroundVisible = (isKeyboardMode || isLogMode) ? prefs.overlay : true;
                sciPad.style.opacity = backgroundVisible ? "1" : "0";
                sciPad.style.pointerEvents = backgroundVisible ? "auto" : "none";
                updateCameraHelpers();
                updateGlassMode();
            };

            const updateGlassMode = () => {
                if (prefs.glassMode || (prefs.autoGlass && (isCameraOn || isPhotoTaken))) {
                    appWrapper.classList.add('liquid-glass-mode');
                } else {
                    appWrapper.classList.remove('liquid-glass-mode');
                }
            }

            /* --- CAMERA ENGINE --- */
            const stopStream = () => {
                if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
            };

            const startCamera = async () => {
                try {
                    const ratioVal = prefs.camRatio === '4:3' ? 4/3 : 16/9;
                    const constraints = { video: { facingMode: 'environment', aspectRatio: { ideal: ratioVal } } };
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    try {
                        const track = stream.getVideoTracks()[0];
                        if (track.getCapabilities) {
                            const caps = track.getCapabilities();
                            if (caps.zoom) {
                                let z = parseFloat(prefs.camZoom);
                                const safeZoom = Math.max(caps.zoom.min, Math.min(z, caps.zoom.max));
                                await track.applyConstraints({ advanced: [{ zoom: safeZoom }] });
                            }
                        }
                    } catch (e) { console.log("Zoom not supported", e); }

                    video.srcObject = stream;
                    video.classList.add('active');
                    indicator.classList.add('visible');
                    indicator.textContent = "camera mode";
                    isCameraOn = true;
                    isPhotoTaken = false;
                    photoPreview.classList.remove('active');
                    
                    kbdGrid.classList.add('keyboard-hidden');
                    bringEssentialsToFront(true);
                    updateCameraHelpers();
                    updateGlassMode();
                    typedDisplay.contentEditable = "false";
                } catch (err) {
                    apiStatus.textContent = "CAMERA ERROR";
                    apiStatus.style.display = "block";
                    setTimeout(() => apiStatus.style.display = "none", 2000);
                }
            };

            const capturePhoto = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                photoPreview.src = canvas.toDataURL('image/jpeg');
                
                stopStream();
                video.srcObject = null;
                video.classList.remove('active');
                
                photoPreview.classList.add('active');
                indicator.textContent = "picture mode";
                isPhotoTaken = true;
                updateCameraHelpers();
                updateGlassMode();
            };

            const retakePhoto = async () => {
                photoPreview.classList.remove('active');
                await startCamera(); 
            };

            const stopCameraSystem = () => {
                stopStream();
                video.srcObject = null;
                video.classList.remove('active');
                photoPreview.classList.remove('active');
                indicator.classList.remove('visible');
                kbdGrid.classList.remove('keyboard-hidden');
                bringEssentialsToFront(false);
                
                isCameraOn = false;
                isPhotoTaken = false;
                updateCameraHelpers();
                updateGlassMode();
                typedDisplay.contentEditable = "true";
            };

            const bringEssentialsToFront = (active) => {
                const essentials = [
                    document.getElementById('btn-0'), document.getElementById('btn-plus'),
                    document.getElementById('btn-minus'), document.getElementById('btn-dot'),
                    document.getElementById('btn-pm')
                ];
                essentials.forEach(btn => { if (active) btn.classList.add('camera-essential'); else btn.classList.remove('camera-essential'); });
                helpers.forEach(h => {
                    const parentId = h.parentElement.id;
                    if (active && !['btn-0', 'btn-plus', 'btn-minus', 'btn-dot', 'btn-pm'].includes(parentId)) { h.style.visibility = 'hidden'; } 
                    else { h.style.visibility = 'visible'; }
                });
            };

            const updateCameraHelpers = () => {
                const h0 = document.getElementById('helper-0');
                const hDot = document.getElementById('helper-dot');
                const hPlus = document.getElementById('helper-plus');
                const hMinus = document.getElementById('helper-minus');
                const hPm = document.getElementById('helper-pm');
                
                if (isKeyboardMode) {
                    h0.style.display = 'block'; hDot.style.display = 'block'; hPlus.style.display = 'block'; hPm.style.display = 'block';
                    h0.textContent = !isCameraOn ? 'camera' : (isPhotoTaken ? '' : 'capture');
                    hDot.textContent = isCameraOn ? 'cancel' : '';
                    hPlus.textContent = isPhotoTaken ? 'solve' : 'send';
                    hMinus.textContent = isPhotoTaken ? 'retake' : '';
                    hMinus.style.display = isPhotoTaken ? 'block' : 'none';
                    hPm.textContent = isCameraOn || isPhotoTaken ? (prefs.autoDeepSeek ? 'deepseek' : 'gemini') : '';
                }
            };

            /* --- TWO-STEP AI PIPELINE (GEMINI EXTRACTION -> DEEPSEEK REASONING) --- */
            const callDeepSeek = async (imageB64 = null) => {
                const userContent = typedDisplay.textContent.trim();

                // Validation logic prioritizing DeepSeek for text, Gemini for vision, but allowing full fallback if only one key is present.
                if (imageB64) {
                    if (!prefs.geminiKey && !prefs.apiKey) {
                        apiStatus.textContent = "API KEY REQUIRED";
                        apiStatus.style.display = "block";
                        setTimeout(() => apiStatus.style.display = "none", 4000);
                        return;
                    }
                    if (prefs.autoDeepSeek && !prefs.apiKey && prefs.geminiKey) {
                        apiStatus.textContent = "DEEPSEEK KEY REQ FOR SOLVE";
                        apiStatus.style.display = "block";
                        setTimeout(() => apiStatus.style.display = "none", 4000);
                        return;
                    }
                } else {
                    if (!prefs.apiKey) {
                        apiStatus.textContent = "DEEPSEEK KEY REQUIRED";
                        apiStatus.style.display = "block";
                        setTimeout(() => apiStatus.style.display = "none", 4000);
                        return;
                    }
                }

                apiStatus.textContent = "THINKING...";
                apiStatus.style.display = "block";

                try {
                    if (imageB64) {
                        if (prefs.geminiKey) {
                            if (prefs.autoDeepSeek && prefs.apiKey) {
                                // 1. EXTRACTION PHASE (GEMINI)
                                apiStatus.textContent = "EXTRACTING (GEMINI)...";
                                let extractedText = "";
                                let geminiSuccess = false;
                                let lastGeminiError = "";
                                let usedGeminiModel = "";
                                
                                // Smart Model Fallback Array (Gemini 3.0 -> 3.1 -> 2.5)
                                const geminiModels = ["gemini-3.0-flash", "gemini-3.1-flash-lite", "gemini-2.5-flash"];
                                
                                for (const model of geminiModels) {
                                    try {
                                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${prefs.geminiKey}`, {
                                            method: "POST",
                                            headers: { "Content-Type": "application/json" },
                                            body: JSON.stringify({
                                                contents: [{ parts: [{ text: prefs.geminiPrompt }, { inlineData: { mimeType: "image/jpeg", data: imageB64 } }] }],
                                                generationConfig: { temperature: prefs.aiTemp }
                                            })
                                        });
                                        
                                        if (res.ok) {
                                            const data = await res.json();
                                            extractedText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                                            geminiSuccess = true;
                                            usedGeminiModel = model;
                                            break; 
                                        } else {
                                            const errData = await res.json();
                                            lastGeminiError = errData.error?.message || `HTTP ${res.status}`;
                                        }
                                    } catch (err) {
                                        lastGeminiError = err.message;
                                    }
                                }

                                if (!geminiSuccess) throw new Error("Gemini Vision Failed: " + lastGeminiError);

                                let blocks = [];
                                blocks.push({ header: "USER INPUT", text: userContent ? `[Vision Task]\n${userContent}` : "[Vision Task]" });
                                blocks.push({ header: `OCR SCAN (${usedGeminiModel})`, text: extractedText });

                                // 2. REASONING PHASE (DEEPSEEK)
                                apiStatus.textContent = "SOLVING (DEEPSEEK)...";
                                
                                const combinedPrompt = `${prefs.reasoningPrompt}\n\nExtracted Text from Image:\n${extractedText}${userContent ? "\n\nUser Context:\n" + userContent : ""}`;
                                
                                const dsPayload = { model: prefs.model, messages: [{ role: "user", content: combinedPrompt }] };
                                if (prefs.model !== 'deepseek-reasoner') dsPayload.temperature = prefs.aiTemp;

                                const dsRes = await fetch("https://api.deepseek.com/chat/completions", {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${prefs.apiKey}` },
                                    body: JSON.stringify(dsPayload)
                                });

                                if (!dsRes.ok) {
                                    let errorMsg = `DeepSeek Error: ${dsRes.status}`;
                                    try { const errData = await dsRes.json(); errorMsg = errData.error?.message || errorMsg; } catch(e) {}
                                    throw new Error(errorMsg);
                                }
                                
                                const dsData = await dsRes.json();
                                const finalResult = dsData.choices?.[0]?.message?.content || "No result.";
                                
                                // Log final answer to history
                                blocks.push({ header: `SOLUTION (${prefs.model})`, text: finalResult });
                                history.push({ blocks });
                                localStorage.setItem('aiHistory', JSON.stringify(history));
                                
                                typedDisplay.textContent = finalResult;
                                
                            } else {
                                // ONE-STEP GEMINI SOLVING (If autoDeepSeek is OFF)
                                apiStatus.textContent = "SOLVING (GEMINI)...";

                                let finalResult = "";
                                let geminiSuccess = false;
                                let lastGeminiError = "";
                                let usedGeminiModel = "";
                                const geminiModels = ["gemini-3.0-flash", "gemini-3.1-flash-lite", "gemini-2.5-flash"];
                                
                                for (const model of geminiModels) {
                                    try {
                                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${prefs.geminiKey}`, {
                                            method: "POST",
                                            headers: { "Content-Type": "application/json" },
                                            body: JSON.stringify({
                                                contents: [{ parts: [{ text: prefs.cameraPrompt + (userContent ? "\n\nUser Notes: " + userContent : "") }, { inlineData: { mimeType: "image/jpeg", data: imageB64 } }] }],
                                                generationConfig: { temperature: prefs.aiTemp }
                                            })
                                        });
                                        
                                        if (res.ok) {
                                            const data = await res.json();
                                            finalResult = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                                            geminiSuccess = true;
                                            usedGeminiModel = model;
                                            break;
                                        } else {
                                            const errData = await res.json();
                                            lastGeminiError = errData.error?.message || `HTTP ${res.status}`;
                                        }
                                    } catch (err) {
                                        lastGeminiError = err.message;
                                    }
                                }

                                if (!geminiSuccess) throw new Error("Gemini Vision Failed: " + lastGeminiError);

                                let blocks = [];
                                blocks.push({ header: "USER INPUT", text: userContent ? `[Vision Task]\n${userContent}` : "[Vision Task]" });
                                blocks.push({ header: `SOLUTION (${usedGeminiModel})`, text: finalResult });
                                
                                history.push({ blocks });
                                localStorage.setItem('aiHistory', JSON.stringify(history));
                                
                                typedDisplay.textContent = finalResult;
                            }
                        } else {
                            // FALLBACK TO DEEPSEEK DIRECT VISION
                            apiStatus.textContent = "SOLVING (DEEPSEEK VISION)...";
                            const combinedPrompt = `${prefs.cameraPrompt}${userContent ? "\n\nUser Context:\n" + userContent : ""}`;
                            
                            const dsVisPayload = {
                                model: prefs.model, 
                                messages: [{ role: "user", content: [
                                    { type: "text", text: combinedPrompt },
                                    { type: "image_url", image_url: { url: "data:image/jpeg;base64," + imageB64 } }
                                ]}]
                            };
                            if (prefs.model !== 'deepseek-reasoner') dsVisPayload.temperature = prefs.aiTemp;

                            const dsRes = await fetch("https://api.deepseek.com/chat/completions", {
                                method: "POST",
                                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${prefs.apiKey}` },
                                body: JSON.stringify(dsVisPayload)
                            });

                            if (!dsRes.ok) {
                                let errorMsg = `DeepSeek Error: ${dsRes.status}`;
                                try { const errData = await dsRes.json(); errorMsg = errData.error?.message || errorMsg; } catch(e) {}
                                throw new Error(errorMsg);
                            }
                            
                            const dsData = await dsRes.json();
                            const finalResult = dsData.choices?.[0]?.message?.content || "No result.";
                            
                            let blocks = [];
                            blocks.push({ header: "USER INPUT", text: userContent ? `[Vision Task]\n${userContent}` : "[Vision Task]" });
                            blocks.push({ header: `SOLUTION (${prefs.model})`, text: finalResult });
                            
                            history.push({ blocks });
                            localStorage.setItem('aiHistory', JSON.stringify(history));
                            
                            typedDisplay.textContent = finalResult;
                        }

                        apiStatus.textContent = "COMPLETE";
                        justReceivedAiResponse = true;
                        
                        // RENDER MATH (LATEX)
                        renderMathInElement(typedDisplay, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });

                        setTimeout(() => apiStatus.style.display = "none", 2000);
                        stopCameraSystem();

                    } else {
                        // STANDARD TEXT ONLY PHASE (DEEPSEEK)
                        apiStatus.textContent = "THINKING (DEEPSEEK)...";
                        const promptToUse = prefs.model === 'deepseek-reasoner' ? prefs.reasoningPrompt : prefs.thinkingPrompt;

                        const messages = [];
                        if (prefs.memoryMode && history.length > 0) {
                            history.slice(-15).forEach(entry => {
                                let pastUser = entry.blocks ? (entry.blocks.find(b => b.header === "USER INPUT")?.text || "") : (entry.prompt || "");
                                let pastAssistant = entry.blocks ? (entry.blocks.find(b => b.header.startsWith("SOLUTION") || b.header.startsWith("RECV"))?.text || "") : (entry.response || "");
                                if (pastUser && !pastUser.includes("[Vision Task]") && !pastUser.includes("[Image Extracted]") && !pastUser.includes("[Gemini")) {
                                    messages.push({ role: "user", content: pastUser });
                                    if (pastAssistant) messages.push({ role: "assistant", content: pastAssistant });
                                }
                            });
                        }
                        messages.push({ role: "user", content: promptToUse + "\n\n" + userContent });

                        const textPayload = { model: prefs.model, messages: messages };
                        if (prefs.model !== 'deepseek-reasoner') textPayload.temperature = prefs.aiTemp;

                        const res = await fetch("https://api.deepseek.com/chat/completions", {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${prefs.apiKey}` },
                            body: JSON.stringify(textPayload)
                        });

                        if (!res.ok) {
                            let errorMsg = `HTTP Error: ${res.status}`;
                            try { const errData = await res.json(); errorMsg = errData.error?.message || errorMsg; } catch(e) {}
                            throw new Error(errorMsg);
                        }
                        
                        const data = await res.json();
                        const result = data.choices?.[0]?.message?.content || "No result.";
                        
                        let blocks = [];
                        blocks.push({ header: "USER INPUT", text: userContent || "[Empty Input]" });
                        blocks.push({ header: `SOLUTION (${prefs.model})`, text: result });
                        
                        history.push({ blocks });
                        localStorage.setItem('aiHistory', JSON.stringify(history));
                        
                        typedDisplay.textContent = result;
                        apiStatus.textContent = "COMPLETE";
                        
                        justReceivedAiResponse = true;
                        
                        // RENDER MATH (LATEX)
                        renderMathInElement(typedDisplay, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });

                        setTimeout(() => apiStatus.style.display = "none", 2000);
                    }
                } catch (e) {
                    apiStatus.textContent = "API ERROR";
                    setTimeout(() => apiStatus.style.display = "none", 3000);
                    typedDisplay.textContent = `Error Details:\n${e.message}`;
                    justReceivedAiResponse = true;
                }
            };

            /* --- EVENT HANDLERS --- */
            toggleKeyboardBtn.onclick = () => { isKeyboardMode = !isKeyboardMode; isLogMode = false; logPad.classList.remove('active'); kbdGrid.classList.toggle('active', isKeyboardMode); helpers.forEach(h => h.style.display = isKeyboardMode ? 'block' : 'none'); if (isCameraOn) stopCameraSystem(); applyPrefs(); if (isKeyboardMode) renderKeyboard(); };
            toggleLogBtn.onclick = () => { 
                isLogMode = !isLogMode; 
                isKeyboardMode = false; 
                kbdGrid.classList.remove('active'); 
                logPad.classList.toggle('active', isLogMode); 
                helpers.forEach(h => h.style.display = isLogMode ? 'block' : 'none'); 
                if (isCameraOn) stopCameraSystem(); 
                applyPrefs(); 
                if (isLogMode) {
                    renderLog(); 
                }
            };

            const renderLog = () => {
                logPad.innerHTML = history.length === 0 ? '<div style="opacity:0.3; text-align:center; margin-top:30px; color:white;">no log yet</div>' : '';
                history.forEach(entry => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    
                    if (entry.blocks) {
                        let htmlContent = "";
                        entry.blocks.forEach(b => {
                            htmlContent += `<div class="log-prompt">> ${b.header}</div><div class="log-response">${b.text}</div><div style="height:10px;"></div>`;
                        });
                        div.innerHTML = htmlContent;
                    } else {
                        // Backwards compatibility for older history entries
                        div.innerHTML = `<div class="log-prompt">> USER INPUT</div><div class="log-response">${entry.prompt}</div><div style="height:10px;"></div><div class="log-prompt">> SOLUTION</div><div class="log-response">${entry.response}</div>`;
                    }
                    logPad.appendChild(div);
                });
                
                // RENDER MATH IN LOG TOO
                renderMathInElement(logPad, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });

                // Auto-scroll to the bottom for the newest log
                setTimeout(() => {
                    logPad.scrollTop = logPad.scrollHeight;
                }, 10);
            };

            const renderKeyboard = () => {
                kbdContent.innerHTML = '';
                const layout = [["q","w","e","r","t","y","u","i","o","p"],["a","s","d","f","g","h","j","k","l"],["SHIFT","z","x","c","v","b","n","m","BS"],["123","SPACE","RETURN"]];
                layout.forEach((row) => {
                    const div = document.createElement('div');
                    div.className = 'kbd-row';
                    row.forEach(key => {
                        const btn = document.createElement('button');
                        btn.className = 'calc-btn kbd-btn';
                        if (key === 'SHIFT') { btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M12 4l-8 8h5v8h6v-8h5z" fill="currentColor"/></svg>`; btn.classList.add('ctrl-key'); if (isShift) btn.classList.add('shift-active'); }
                        else if (key === 'BS') { btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:20px;height:20px;"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L.37 12l5.04 8.12c.36.53.9.88 1.59.88h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" fill="currentColor"/></svg>`; btn.classList.add('ctrl-key'); }
                        else if (['ABC','123','#+='].includes(key)) { btn.classList.add('ctrl-key'); btn.textContent = key; }
                        else if (key === 'SPACE') { btn.style.flex = '5'; btn.textContent = 'space'; btn.classList.add('ctrl-key'); }
                        else if (key === 'RETURN') { btn.style.flex = '2'; btn.textContent = 'return'; btn.classList.add('ctrl-key'); }
                        else { btn.textContent = isShift && keyboardState === 'alpha' ? key.toUpperCase() : key; }
                        btn.onclick = (e) => { e.preventDefault(); handleKbdPress(key); };
                        div.appendChild(btn);
                    });
                    kbdContent.appendChild(div);
                });
            };

            const appendText = (char) => {
                if (justReceivedAiResponse) {
                    typedDisplay.textContent = '';
                    justReceivedAiResponse = false;
                }
                typedDisplay.appendChild(document.createTextNode(char));
                typedDisplay.scrollTop = typedDisplay.scrollHeight;
            };

            const handleKbdPress = (key) => {
                if (key === 'SHIFT') { isShift = !isShift; renderKeyboard(); }
                else if (key === '123') { keyboardState = 'num'; isShift = false; renderKeyboard(); }
                else if (key === 'ABC') { keyboardState = 'alpha'; isShift = false; renderKeyboard(); }
                else if (key === '#+=') { keyboardState = 'sym'; renderKeyboard(); }
                else if (key === 'BS') { 
                    if (justReceivedAiResponse) { typedDisplay.textContent = ''; justReceivedAiResponse = false; }
                    else { const t = typedDisplay.textContent; if (t.length > 0) typedDisplay.textContent = t.slice(0, -1); }
                }
                else if (key === 'SPACE') appendText(' ');
                else if (key === 'RETURN') appendText('\n');
                else { let char = isShift && keyboardState === 'alpha' ? key.toUpperCase() : key; appendText(char); if (isShift) { isShift = false; renderKeyboard(); } }
            };

            const handleScientific = (btn) => {
                let val = parseFloat(currentInput), res = val;
                const id = btn.id;
                const text = btn.textContent.trim().replace(/\s/g, ''); 
                
                const factorial = (n) => {
                    if (n < 0 || !Number.isInteger(n)) return NaN;
                    if (n === 0) return 1;
                    let r = 1; for(let i=2; i<=n; i++) r*=i; return r;
                };
                const toRad = (d) => d * Math.PI / 180;
                const fromRad = (r) => r * 180 / Math.PI;

                if (id === 'btn-2nd') {
                    is2nd = !is2nd;
                    document.getElementById('btn-ex').innerHTML = is2nd ? 'y<sup>x</sup>' : 'e<sup>x</sup>';
                    document.getElementById('btn-10x').innerHTML = is2nd ? '2<sup>x</sup>' : '10<sup>x</sup>';
                    document.getElementById('btn-ln').innerHTML = is2nd ? 'log<sub>y</sub>' : 'ln';
                    document.getElementById('btn-sin').innerHTML = is2nd ? 'sin⁻¹' : 'sin';
                    document.getElementById('btn-cos').innerHTML = is2nd ? 'cos⁻¹' : 'cos';
                    document.getElementById('btn-tan').innerHTML = is2nd ? 'tan⁻¹' : 'tan';
                    document.getElementById('btn-sinh').innerHTML = is2nd ? 'sinh⁻¹' : 'sinh';
                    document.getElementById('btn-cosh').innerHTML = is2nd ? 'cosh⁻¹' : 'cosh';
                    document.getElementById('btn-tanh').innerHTML = is2nd ? 'tanh⁻¹' : 'tanh';
                    btn.style.backgroundColor = is2nd ? '#FFFFFF' : 'var(--sci-dark-grey)';
                    btn.style.color = is2nd ? '#000000' : '#FFFFFF';
                    return;
                }

                if (text === '(') { bracketStack.push({prev: previousInput, op: operator}); previousInput = ''; operator = null; currentInput = '0'; waitingForNewValue = true; return; }
                if (text === ')') { calculate(); if (bracketStack.length > 0) { let state = bracketStack.pop(); previousInput = state.prev; operator = state.op; calculate(); } return; }
                if (text === 'mc') { memoryValue = 0; waitingForNewValue = true; return; }
                if (text === 'm+') { memoryValue += val; waitingForNewValue = true; return; }
                if (text === 'm-') { memoryValue -= val; waitingForNewValue = true; return; }
                if (text === 'mr') { currentInput = memoryValue.toString(); waitingForNewValue = true; updateD(); return; }
                if (id === 'btn-rad') { isDegrees = !isDegrees; btn.innerHTML = isDegrees ? 'Rad' : 'Deg'; return; }

                if (text === 'x2') res = val ** 2;
                else if (text === 'x3') res = val ** 3;
                else if (text === 'xy') { operator = '^'; previousInput = currentInput; waitingForNewValue = true; return; }
                else if (id === 'btn-ex') { if (is2nd) { operator = 'y^x'; previousInput = currentInput; waitingForNewValue = true; return; } else res = Math.exp(val); }
                else if (id === 'btn-10x') res = is2nd ? 2 ** val : 10 ** val;
                else if (id === 'btn-1x') res = 1 / val;
                else if (text === '2√x') res = Math.sqrt(val);
                else if (text === '3√x') res = Math.cbrt(val);
                else if (text === 'y√x') { operator = 'yroot'; previousInput = currentInput; waitingForNewValue = true; return; }
                else if (id === 'btn-ln') { if (is2nd) { operator = 'logy'; previousInput = currentInput; waitingForNewValue = true; return; } else res = Math.log(val); }
                else if (id === 'btn-log') res = Math.log10(val);
                else if (text === 'x!') res = factorial(val);
                else if (id === 'btn-sin') res = is2nd ? (isDegrees ? fromRad(Math.asin(val)) : Math.asin(val)) : Math.sin(isDegrees ? toRad(val) : val);
                else if (id === 'btn-cos') res = is2nd ? (isDegrees ? fromRad(Math.acos(val)) : Math.acos(val)) : Math.cos(isDegrees ? toRad(val) : val);
                else if (id === 'btn-tan') res = is2nd ? (isDegrees ? fromRad(Math.atan(val)) : Math.atan(val)) : Math.tan(isDegrees ? toRad(val) : val);
                else if (text === 'e') res = Math.E;
                else if (text === 'EE') { operator = 'EE'; previousInput = currentInput; waitingForNewValue = true; return; }
                else if (text === 'Rand') res = Math.random();
                else if (id === 'btn-sinh') res = is2nd ? Math.asinh(val) : Math.sinh(val);
                else if (id === 'btn-cosh') res = is2nd ? Math.acosh(val) : Math.cosh(val);
                else if (id === 'btn-tanh') res = is2nd ? Math.atanh(val) : Math.tanh(val);
                else if (text === 'π') res = Math.PI;

                currentInput = (Math.round(res * 1e10) / 1e10).toString();
                waitingForNewValue = true;
                updateD();
            };

            const calculate = () => {
                if (!operator || !previousInput) return;
                let prev = parseFloat(previousInput), cur = parseFloat(currentInput), res = 0;
                switch (operator) {
                    case '+': res = prev + cur; break;
                    case '-': res = prev - cur; break;
                    case '×': res = prev * cur; break;
                    case '÷': res = cur === 0 ? 'Error' : prev / cur; break;
                    case '^': case 'y^x': res = prev ** cur; break;
                    case 'yroot': res = prev ** (1/cur); break;
                    case 'logy': res = Math.log(prev) / Math.log(cur); break;
                    case 'EE': res = prev * (10 ** cur); break;
                }
                if (res !== 'Error') res = Math.round(res * 1e10) / 1e10; 
                currentInput = res.toString(); operator = null; previousInput = ''; waitingForNewValue = true; updateD();
            };

            document.querySelectorAll('.calc-btn').forEach(btn => {
                btn.onclick = () => {
                    const label = btn.getAttribute('aria-label');
                    const textNode = btn.childNodes[0];
                    const id = btn.id;
                    const text = textNode ? textNode.textContent.trim() : "";
                    if (btn.classList.contains('kbd-btn')) return;

                    // CAMERA INTERCEPT
                    if (isKeyboardMode) {
                        // Prevent arbitrary text sending if camera is alive
                        if (isCameraOn && !isPhotoTaken && !['btn-0', 'btn-dot', 'btn-plus', 'btn-minus', 'btn-pm'].includes(id)) return; 
                        
                        if (text === '0') { if (!isCameraOn) startCamera(); else if (!isPhotoTaken) capturePhoto(); return; }
                        if (text === '.') { if (isCameraOn) stopCameraSystem(); return; }
                        if (text === '+') { if (isPhotoTaken) { const b64 = photoPreview.src.split(',')[1]; callDeepSeek(b64); } else callDeepSeek(); return; }
                        if (text === '-') { if (isPhotoTaken) retakePhoto(); return; }
                        
                        // +/- Button Toggle Logic
                        if (id === 'btn-pm' && (isCameraOn || isPhotoTaken)) {
                            prefs.autoDeepSeek = !prefs.autoDeepSeek;
                            localStorage.setItem('autoDeepSeek', prefs.autoDeepSeek);
                            applyPrefs(); 
                            apiStatus.textContent = "ENGINE: " + (prefs.autoDeepSeek ? "DEEPSEEK" : "GEMINI");
                            apiStatus.style.display = "block";
                            setTimeout(() => apiStatus.style.display = "none", 1500);
                            return;
                        }

                        if (isCameraOn && !isPhotoTaken) return; 
                    }

                    if (isKeyboardMode || isLogMode) {
                        if (label === 'Backspace') { 
                            if (justReceivedAiResponse) { typedDisplay.textContent = ''; justReceivedAiResponse = false; }
                            else { const t = typedDisplay.textContent; if (t.length > 0) typedDisplay.textContent = t.slice(0, -1); }
                        }
                        else if (text === 'AC') { typedDisplay.textContent = ''; justReceivedAiResponse = false; }
                        else if (text === '=') appendText('\n');
                        else if (text === '%') appendText('%'); // Insert % character
                        else if (text === '÷') settingsPanel.style.display = 'flex';
                        else if (/[0-9]/.test(text)) appendText(text);
                        return;
                    }

                    // STANDARD CALC ROUTING
                    if (btn.classList.contains('sci-btn')) { handleScientific(btn); return; }
                    
                    if (label === 'Backspace') { if (!waitingForNewValue) currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0'; updateD(); }
                    else if (id === 'btn-pm') { currentInput = (parseFloat(currentInput) * -1).toString(); updateD(); }
                    else if (text === 'AC') { 
                        currentInput = '0'; previousInput = ''; operator = null; waitingForNewValue = false; 
                        typedDisplay.textContent = ''; // Also acts as a hard reset for AI notes
                        bracketStack = [];
                        justReceivedAiResponse = false;
                        updateD(); 
                    }
                    else if (text === '%') { currentInput = (parseFloat(currentInput) / 100).toString(); updateD(); }
                    else if (text === '.') { if (!currentInput.includes('.')) currentInput += '.'; updateD(); }
                    else if (['+', '-', '×', '÷'].includes(text)) { if (operator && !waitingForNewValue) calculate(); previousInput = currentInput; operator = text; waitingForNewValue = true; }
                    else if (text === '=') calculate();
                    else if (/[0-9]/.test(text)) { currentInput = (waitingForNewValue || currentInput === '0') ? text : currentInput + text; waitingForNewValue = false; updateD(); }
                };
            });

            /* --- SETTINGS PERSISTENCE --- */
            document.getElementById('input-gemini-key').oninput = (e) => { prefs.geminiKey = e.target.value; applyPrefs(); localStorage.setItem('geminiKey', prefs.geminiKey); };
            document.getElementById('input-cam-ratio').onchange = (e) => { prefs.camRatio = e.target.value; applyPrefs(); localStorage.setItem('camRatio', prefs.camRatio); };
            document.getElementById('input-cam-zoom').onchange = (e) => { prefs.camZoom = e.target.value; applyPrefs(); localStorage.setItem('camZoom', prefs.camZoom); };
            document.getElementById('input-cam-fit').onchange = (e) => { prefs.camFit = e.target.value; applyPrefs(); localStorage.setItem('camFit', prefs.camFit); };

            document.getElementById('input-ai-temp').oninput = (e) => { prefs.aiTemp = parseFloat(e.target.value); applyPrefs(); localStorage.setItem('aiTemp', prefs.aiTemp); };

            document.getElementById('input-text-opacity').oninput = (e) => { prefs.textOpacity = e.target.value; applyPrefs(); localStorage.setItem('textOpacity', prefs.textOpacity); };
            document.getElementById('input-kbd-opacity').oninput = (e) => { prefs.kbdOpacity = e.target.value; applyPrefs(); localStorage.setItem('kbdOpacity', prefs.kbdOpacity); };
            document.getElementById('input-cam-opacity').oninput = (e) => { prefs.camOpacity = e.target.value; applyPrefs(); localStorage.setItem('camOpacity', prefs.camOpacity); };
            document.getElementById('input-pic-opacity').oninput = (e) => { prefs.picOpacity = e.target.value; applyPrefs(); localStorage.setItem('picOpacity', prefs.picOpacity); };
            document.getElementById('input-log-opacity').oninput = (e) => { prefs.logOpacity = e.target.value; applyPrefs(); localStorage.setItem('logOpacity', prefs.logOpacity); };
            
            document.getElementById('input-memory-toggle').onchange = (e) => { prefs.memoryMode = e.target.checked; applyPrefs(); localStorage.setItem('memoryMode', prefs.memoryMode); };
            document.getElementById('input-overlay-toggle').onchange = (e) => { prefs.overlay = e.target.checked; applyPrefs(); localStorage.setItem('overlay', prefs.overlay); };
            document.getElementById('input-glass-toggle').onchange = (e) => { prefs.glassMode = e.target.checked; applyPrefs(); localStorage.setItem('glassMode', prefs.glassMode); };
            document.getElementById('input-auto-glass-toggle').onchange = (e) => { prefs.autoGlass = e.target.checked; applyPrefs(); localStorage.setItem('autoGlass', prefs.autoGlass); };
            document.getElementById('input-autodeepseek-toggle').onchange = (e) => { prefs.autoDeepSeek = e.target.checked; applyPrefs(); localStorage.setItem('autoDeepSeek', prefs.autoDeepSeek); };
            document.getElementById('input-api-key').oninput = (e) => { prefs.apiKey = e.target.value; localStorage.setItem('deepseekKey', prefs.apiKey); };
            document.getElementById('input-model-mode').onchange = (e) => { prefs.model = e.target.value; localStorage.setItem('deepseekModel', prefs.model); };
            
            document.getElementById('prompt-thinking').oninput = (e) => { prefs.thinkingPrompt = e.target.value; localStorage.setItem('promptThinking', prefs.thinkingPrompt); };
            document.getElementById('prompt-reasoning').oninput = (e) => { prefs.reasoningPrompt = e.target.value; localStorage.setItem('promptReasoning', prefs.reasoningPrompt); };
            document.getElementById('prompt-gemini').oninput = (e) => { prefs.geminiPrompt = e.target.value; localStorage.setItem('promptGemini', prefs.geminiPrompt); };
            document.getElementById('prompt-camera').oninput = (e) => { prefs.cameraPrompt = e.target.value; localStorage.setItem('promptCamera', prefs.cameraPrompt); };

            document.getElementById('clear-log-btn').onclick = () => {
                history = [];
                localStorage.removeItem('aiHistory');
                renderLog();
                const btn = document.getElementById('clear-log-btn');
                btn.textContent = "Log Cleared!";
                setTimeout(() => btn.textContent = "Clear History Log", 1500);
            };

            document.getElementById('close-settings-btn').onclick = () => settingsPanel.style.display = 'none';

            applyPrefs();
            updateD();
        });
    </script>
</body>
</html>
